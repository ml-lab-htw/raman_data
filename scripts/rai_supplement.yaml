  rai:dataSocialImpact: Demonstrates feasibility of SERS-CNN cancer detection from
    conditioned culture media without cell labelling or sample preparation. Potential
    path toward non-invasive, rapid cancer diagnostics. Clinical translation requires
    extensive validation on patient-derived samples under regulatory oversight.
  rai:dataUseCases: Cancer cell-line classification, SERS-based metabolite fingerprinting,
    multi-input CNN benchmarking, comparison of surface functionalization selectivity
    for biomolecule entrapping.
  rai:personalSensitiveInformation: Spectra derived from conditioned media of human
    melanoma cell lines and primary skin cultures collected under ethics approval.
    No direct patient identifiers in the released dataset, but the clinical origin
    means data should be treated with appropriate care under applicable data-protection
    regulations.
cancer_cell_nh2:
  rai:dataAnnotationProtocol: Cell-line and culture-condition labels assigned from
    known sample identity. 12 categories — A2058 melanoma cells, G361 melanoma cells,
    HPM neonatal melanocytes, HF normal skin fibroblasts, ZAM tumour-associated fibroblasts,
    DMEM pure medium control, each at 10% and 0% FBS serum content. This subset uses
    AuMs functionalized with ADT-NH₂ (4-aminobenzenediazonium tosylate), which provides
    selectivity toward proteins and lipids. Ethics approved by Local Ethics Committee
    of General University Hospital Prague in accordance with Helsinki Declaration.
  rai:dataBiases: Cell lines (A2058, G361) and primary cultures (HPM, HF, ZAM) differ
    in growth conditions and serum content (0% vs. 10% FBS), introducing biological
    variability beyond cancer/normal status. SERS spectra show high inter-spectrum
    variability from random sampling of heterogeneous culture media; individual spectra
    cannot be directly interpreted without CNN processing. Measurements performed on
    conditioned culture media (metabolite secretions), not directly on cells. Single-
    laboratory data (Czech University of Technology / Charles University Prague); transfer
    to other AuMs batches or instruments requires validation.
  rai:dataCollection: SERS of conditioned cell culture media on gold grating substrates.
    AuMs functionalized with ADT-NH₂, deposited on Au grating surface. ProRaman-L
    spectrometer (Ondax), 785 nm excitation, 33 mW laser power, automatic regime,
    30 spectra per sample (10 spatial points × 3 s accumulation each). 106 biological
    specimens total across all three functionalization variants.
  rai:dataCollectionType: SERS of cell culture media metabolites entrapped by functionalized
    gold nanoparticles; cell lines and primary cultures from human skin cancer biopsies
    and healthy tissue.
  rai:dataLimitations: SERS spectra of complex biological media are highly variable
    and non-interpretable without CNN; direct spectral matching against reference
    libraries is not feasible. Model trained on 75% / validated on 25% split; external
    validation on independent patient samples not demonstrated. Published CNN achieved
    100% accuracy on the validation set, but this should be interpreted cautiously
    given the small dataset size and the controlled in-vitro conditions.
  rai:dataPreprocessingProtocol: Background removal via Asymmetric Least Squares Smoothing
    (ALSS, lambda 1e5, p 0.01). MinMax normalization to [0, 1] per spectrum. CNN
    architecture uses convolutional feature extractors (one per functionalization input)
    concatenated into a shared fully connected classifier (SoftMax), trained for 400
    epochs, batch size 16, Keras/TensorFlow.
  rai:dataSocialImpact: Demonstrates feasibility of SERS-CNN cancer detection from
    conditioned culture media without cell labelling or sample preparation. Potential
    path toward non-invasive, rapid cancer diagnostics. Clinical translation requires
    extensive validation on patient-derived samples under regulatory oversight.
  rai:dataUseCases: Cancer cell-line classification, SERS-based metabolite fingerprinting,
    multi-input CNN benchmarking, comparison of surface functionalization selectivity
    for biomolecule entrapping.
  rai:personalSensitiveInformation: Spectra derived from conditioned media of human
    melanoma cell lines and primary skin cultures collected under ethics approval.
    No direct patient identifiers in the released dataset, but the clinical origin
    means data should be treated with appropriate care under applicable data-protection
    regulations.
