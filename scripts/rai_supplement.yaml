diabetes_skin_thumbnail:
  rai:dataAnnotationProtocol: Binary DM2/Control labels. 11 DM2 patients (7 female,
    49.5 ± 6.7 years) and 9 healthy controls (7 female, 33.2 ± 4.9 years); University
    of Guanajuato, Mexico; IRB approved; all subjects provided informed consent. DM2
    confirmed by fasting glucose and HbA1c (LabonaCheck MH-200). This subset contains
    spectra from the left thumbnail.
  rai:dataBiases: Small cohort (20 subjects) from a single Mexican academic centre.
    Thumbnail spectra are dominated by keratin features; the signal-to-noise ratio
    for diabetes-related biomarkers may be lower than at soft-tissue sites. Age
    difference between groups may confound keratin composition.
  rai:dataCollection: In vivo portable Raman spectroscopy on skin. PEK-785 spectrometer
    (Agiltron Inc.), 785 nm excitation, 90 mW, 200 µm spot size, 12 cm⁻¹ resolution,
    5 scans per measurement (~15 s total exposure, ANSI Z136.1 compliant). Probe
    held at 90° against the thumbnail without exerting pressure.
  rai:dataCollectionType: In vivo non-invasive portable Raman spectroscopy of human
    thumbnail, collected under an IRB-approved clinical research protocol.
  rai:dataLimitations: 20-subject pilot study; ANN 88.9–90.9% accuracy, SVM 76.0–82.5%,
    10-fold cross-validation. Thumbnail site may yield lower DM2 discriminability
    than soft-tissue sites. Optica Open Access Publishing Agreement license.
  rai:dataPreprocessingProtocol: Vancouver Raman Algorithm (VRA) fluorescence background
    removal, cropped to 800–1800 cm⁻¹, area-normalised (unitary area), zero-mean
    centered.
  rai:dataSocialImpact: Non-invasive skin Raman spectroscopy has potential as a
    low-cost DM2 screening tool. Clinical deployment requires large-scale multicentre
    validation and regulatory approval.
  rai:dataUseCases: DM2 vs. healthy skin classification, nail keratin Raman benchmarking,
    non-invasive screening, ANN/SVM site comparison.
  rai:personalSensitiveInformation: Spectra acquired in vivo from human subjects under
    IRB approval. No direct identifiers included, but medical context (diabetes status,
    age, sex) makes this sensitive health data under applicable regulations.
diabetes_skin_vein:
  rai:dataAnnotationProtocol: Binary DM2/Control labels. 11 DM2 patients (7 female,
    49.5 ± 6.7 years) and 9 healthy controls (7 female, 33.2 ± 4.9 years); University
    of Guanajuato, Mexico; IRB approved; all subjects provided informed consent. DM2
    confirmed by fasting glucose and HbA1c (LabonaCheck MH-200). This subset contains
    spectra from the left median cubital vein.
  rai:dataBiases: Small cohort (20 subjects) from a single Mexican academic centre.
    Vein spectra may include subsurface blood-vessel contributions in addition to
    skin tissue. Age difference between groups may confound biomarker signals.
    The portable PEK-785 spectrometer (12 cm⁻¹ resolution) limits spectral detail.
  rai:dataCollection: In vivo portable Raman spectroscopy on skin overlying the left
    median cubital vein. PEK-785 spectrometer (Agiltron Inc.), 785 nm excitation,
    90 mW, 200 µm spot size, 12 cm⁻¹ resolution, 5 scans per measurement (~15 s
    total exposure, ANSI Z136.1 compliant). Probe held at 90° without pressure.
  rai:dataCollectionType: In vivo non-invasive portable Raman spectroscopy of human
    skin overlying the median cubital vein, collected under an IRB-approved clinical
    research protocol.
  rai:dataLimitations: 20-subject pilot study; ANN 88.9–90.9% accuracy, SVM 76.0–82.5%,
    10-fold cross-validation. Optica Open Access Publishing Agreement license.
  rai:dataPreprocessingProtocol: Vancouver Raman Algorithm (VRA) fluorescence background
    removal, cropped to 800–1800 cm⁻¹, area-normalised (unitary area), zero-mean
    centered.
  rai:dataSocialImpact: Non-invasive skin Raman spectroscopy has potential as a
    low-cost DM2 screening tool. Clinical deployment requires large-scale multicentre
    validation and regulatory approval.
  rai:dataUseCases: DM2 vs. healthy skin classification, non-invasive screening near
    vascular sites, ANN/SVM benchmarking, portable Raman site comparison.
  rai:personalSensitiveInformation: Spectra acquired in vivo from human subjects under
    IRB approval. No direct identifiers included, but medical context (diabetes status,
    age, sex) makes this sensitive health data under applicable regulations.
    applicable data-protection regulations.
ecoli_fermentation:
  rai:dataAnnotationProtocol: Ground-truth target values measured by validated reference
    analytical methods (e.g., enzymatic assays, dynamic light scattering, gas chromatography,
    or DFT computation).
  rai:dataBiases: Data were acquired under controlled laboratory conditions and may
    not generalise to field or clinical settings. Spectral profiles are influenced
    by instrument-specific factors (laser wavelength, detector type, optical path
    length, integration time). Class imbalances may be present in classification datasets.
  rai:dataCollection: Raman spectra were acquired experimentally using a laser spectrometer.
    Each spectrum represents the scattered light intensity as a function of Raman
    shift (cm⁻¹).
  rai:dataCollectionType: Laboratory measurements on biological materials including
    microorganisms, cell cultures, fermentation broths, and plant material.
  rai:dataLimitations: 'Spectral signatures are process- and instrument-specific;
    calibration transfer to other setups requires additional validation. Note: No
    explicit license was stated by the original data providers; CC BY 4.0 has been
    assumed. Users should verify the applicable terms with the original authors.'
  rai:dataPreprocessingProtocol: Spectra may have undergone baseline correction, smoothing,
    normalisation, and wavenumber calibration. Exact steps are described in the accompanying
    publication.
  rai:dataSocialImpact: Enables the development of rapid, inline bioprocess monitoring
    tools that can reduce waste, improve yield, and lower costs in biomanufacturing
    and biotechnology.
  rai:dataUseCases: Chemometric modelling, calibration transfer, multivariate regression,
    quantitative spectral analysis, process analytical technology (PAT).
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical, biological, or material samples without individual
    human identifiers.
