succinic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for acid species derived from
    pH-based dissociation equilibria and Indirect Hard Modeling (IHM), following the
    same methodology established for itaconic, formic, acetic, and citric acid in
    the source publication (DOI 10.1177/0003702820973275). Succinic acid is diprotic
    (pKa1 ≈ 4.21, pKa2 ≈ 5.64); three species (SA, SA⁻, SA²⁻) are present in the
    titration data. Detailed accuracy metrics for succinic acid are not reported in
    the main paper.
  rai:dataBiases: Spectra collected under ideal dilute mixture assumption (activity
    coefficients = 1) at a single instrument (Kaiser RXN2, 785 nm) and temperature
    (25 °C). Succinic acid data is part of the extended dataset repository but not
    the primary focus of the source publication. As a diprotic acid, SA⁻ and SA²⁻
    species may exhibit spectral similarity, potentially limiting their individual
    quantification accuracy, analogous to the CA²⁻ / CA³⁻ challenge in citric acid.
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of succinic acid in deionized water (0.8 μS cm⁻¹) at 25 °C using a Kaiser RXN2
    Raman analyzer (400 mW, 785 nm) with NIR fiber-optic immersion probe, spectral
    range 160–3285 cm⁻¹, 4 cm⁻¹ resolution, 60 s acquisition time. Ambient light
    excluded by non-transparent black PVC liner. pH monitored continuously with SenTix
    940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of diprotic succinic acid (C₄H₆O₄)
    in aqueous solution. Spectra recorded at pH equilibrium across the full titration
    range for three dissociation species (SA, SA⁻, SA²⁻).
  rai:dataLimitations: Detailed calibration accuracy metrics not reported in the main
    paper (Echtermeyer et al., 2021); refer to the dataset repository for further
    details. Diprotic system with two overlapping dissociation steps may cause spectral
    co-elution of SA⁻ and SA²⁻. Models calibrated on NaOH titration in deionized
    water at 25 °C only; ideal mixture assumption not strictly valid above 0.1 mol L⁻¹.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied, following the same protocol
    as for the other acid species in this collection. Evaluation range 1025–1850 cm⁻¹,
    excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Preprocessing in MATLAB R2017a
    and PEAXACT ver. 4.5 (S-PACT).
  rai:dataSocialImpact: Succinic acid is one of the top twelve biobased platform chemicals
    identified by the US Department of Energy, with applications in polymers, coatings,
    and food additives. Inline dissociation monitoring is directly relevant to pH-dependent
    extraction and crystallisation in bio-succinic acid production from fermentation.
  rai:dataUseCases: Inline monitoring of diprotic carboxylic acid dissociation; PAT
    in succinic acid fermentation and downstream purification; IHM and chemometric
    model development for biobased diprotic acid systems; comparison with itaconic
    acid (also diprotic) for method validation and transfer.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
sugar_mixtures_high_snr:
  rai:dataAnnotationProtocol: Ground-truth endmember signatures obtained from the
    median of reference spectra collected from five additional pure-solution wells
    (water, sucrose, fructose, maltose, glucose at 375 µL each; 8 reference spectra
    per component in the high-SNR setup). Ground-truth fractional abundances determined
    from the volume ratios of the components present in each mixture. No supervised
    concentration labels are used; unmixing performance is evaluated against these
    reference-derived ground truths.
  rai:dataBiases: Dataset collected on a single custom B-Raman microspectroscopy
    platform; spectral characteristics are instrument-specific and may not transfer
    directly to other Raman systems. Only four sugar species (sucrose, fructose,
    maltose, glucose) are represented; models trained on this data may not generalise
    to chemical systems with more endmembers or different spectral properties. The
    volume-based concentration design (0, 30, 75, 120 µL in 375 µL total) limits
    coverage of arbitrary mixture compositions. Linear mixing is assumed; bilinear
    or nonlinear interactions are not modelled.
  rai:dataCollection: Raman spectra acquired at 5 s integration time using a custom
    B-Raman microspectroscopy platform (Thorlabs Cerna body with BWTek
    BRM-785-0.55-100-0.22-SMA laser excitation source at 785 nm and 36.3 mW, and
    Ibsen EAGLE RAMAN-S spectrometer). Spectra collected in reflection via a Leica
    N PLAN 10x/0.25 objective (0.25 NA) over wavenumbers 142–3684.8 cm⁻¹. A library
    of 240 aqueous sugar mixture solutions was prepared in 96-well plates (375 µL
    per well) covering a full factorial design of four sugar types at four volume
    levels each; five additional pure-solution wells provided reference endmember
    spectra. Measurements repeated at two positions per well with four repetitions,
    yielding 1,920 spectra (1,960 including reference spectra).
  rai:dataCollectionType: Experimental Raman microspectroscopy measurements on aqueous
    sugar mixture solutions (sucrose, fructose, maltose, glucose), collected in a
    controlled laboratory setting as a benchmark for hyperspectral unmixing algorithms
    under high signal-to-noise conditions (5 s integration).
  rai:dataLimitations: Only four sugar species at a limited set of discrete volume
    levels; models may not generalise to broader chemical diversity or continuously
    varying concentrations. Ground-truth fractional abundances are derived from volume
    ratios rather than independent analytical measurements such as HPLC. Linear mixing
    is assumed throughout; bilinear or post-nonlinear interactions are not modelled.
    Dataset size (1,920 spectra) is relatively small compared to imaging datasets.
  rai:dataPreprocessingProtocol: Spectra cropped to 400–1,800 cm⁻¹; baseline correction
    using Adaptive Smoothness Parameter Penalized Least Squares (ASPLS) with smoothing
    parameter lambda = 1e5, differential matrix order 2, maximum 100 iterations,
    and exit-criteria tolerance 0.001; global vector normalization dividing each
    spectrum by its maximum observed intensity. For model training on high-SNR data,
    an additional MSE abundance term (weight 1000) augments the spectral angle
    divergence loss to improve abundance estimation given the weak water endmember.
  rai:dataSocialImpact: Provides a rigorously characterised experimental benchmark
    for evaluating unsupervised and self-supervised hyperspectral unmixing algorithms
    in Raman spectroscopy. Improved unmixing accuracy supports label-free, nondestructive
    chemical characterisation in food quality control, pharmaceutical analysis,
    biological imaging, and environmental monitoring.
  rai:dataUseCases: Benchmarking hyperspectral unmixing algorithms for endmember
    extraction and fractional abundance estimation; development and evaluation of
    unsupervised autoencoder-based unmixing methods; paired comparison with the
    low-SNR variant to study the effect of signal-to-noise ratio on unmixing
    performance; validation of physics-constrained neural network architectures.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from aqueous sugar solutions without individual human
    identifiers.
sugar_mixtures_low_snr:
  rai:dataAnnotationProtocol: Ground-truth endmember signatures obtained from the
    median of reference spectra collected from five additional pure-solution wells
    (water, sucrose, fructose, maltose, glucose at 375 µL each; 32 reference spectra
    per component in the low-SNR setup). Ground-truth fractional abundances determined
    from the volume ratios of the components present in each mixture. No supervised
    concentration labels are used; unmixing performance is evaluated against these
    reference-derived ground truths.
  rai:dataBiases: Dataset collected on a single custom B-Raman microspectroscopy
    platform; spectral characteristics are instrument-specific and may not transfer
    directly to other Raman systems. Only four sugar species (sucrose, fructose,
    maltose, glucose) are represented; models trained on this data may not generalise
    to chemical systems with more endmembers or different spectral properties. The
    short integration time (0.5 s) introduces substantial shot noise and baseline
    artefacts; conventional unmixing methods are known to degrade significantly under
    these conditions, which may bias benchmarking results in favour of noise-robust
    approaches. Linear mixing is assumed; bilinear or nonlinear interactions are
    not modelled.
  rai:dataCollection: Raman spectra acquired at 0.5 s integration time using a custom
    B-Raman microspectroscopy platform (Thorlabs Cerna body with BWTek
    BRM-785-0.55-100-0.22-SMA laser excitation source at 785 nm and 36.3 mW, and
    Ibsen EAGLE RAMAN-S spectrometer). Spectra collected in reflection via a Leica
    N PLAN 10x/0.25 objective (0.25 NA) over wavenumbers 142–3684.8 cm⁻¹. A library
    of 240 aqueous sugar mixture solutions was prepared in 96-well plates (375 µL
    per well) covering a full factorial design of four sugar types at four volume
    levels each; five additional pure-solution wells provided reference endmember
    spectra. Measurements repeated at eight positions per well with four repetitions,
    yielding 7,840 spectra (7,840 including reference spectra).
  rai:dataCollectionType: Experimental Raman microspectroscopy measurements on aqueous
    sugar mixture solutions (sucrose, fructose, maltose, glucose), collected in a
    controlled laboratory setting as a benchmark for hyperspectral unmixing algorithms
    under low signal-to-noise conditions (0.5 s integration).
  rai:dataLimitations: Only four sugar species at a limited set of discrete volume
    levels; models may not generalise to broader chemical diversity or continuously
    varying concentrations. Ground-truth fractional abundances are derived from volume
    ratios rather than independent analytical measurements such as HPLC. The low
    SNR (0.5 s integration) causes the spectra to exhibit substantial noise, baseline
    variations, and cosmic spikes; this makes endmember identification challenging
    and increases the difficulty of the benchmark relative to the high-SNR variant.
    Linear mixing is assumed throughout; bilinear or post-nonlinear interactions
    are not modelled.
  rai:dataPreprocessingProtocol: Spectra cropped to 400–1,800 cm⁻¹; baseline correction
    using Adaptive Smoothness Parameter Penalized Least Squares (ASPLS) with smoothing
    parameter lambda = 1e5, differential matrix order 2, maximum 100 iterations,
    and exit-criteria tolerance 0.001; global vector normalization dividing each
    spectrum by its maximum observed intensity. Standard spectral angle divergence
    (SAD) loss used for model training without the additional MSE abundance term
    applied in the high-SNR variant.
  rai:dataSocialImpact: Provides a challenging low-SNR experimental benchmark for
    evaluating the noise robustness of unsupervised and self-supervised hyperspectral
    unmixing algorithms in Raman spectroscopy. Demonstrates the advantage of
    autoencoder-based methods over conventional approaches when data quality is limited,
    with relevance to rapid screening, in-line monitoring, and portable Raman
    applications where long integration times are impractical.
  rai:dataUseCases: Benchmarking hyperspectral unmixing algorithms under realistic
    low-SNR conditions; evaluation of noise robustness in endmember extraction and
    fractional abundance estimation; paired comparison with the high-SNR variant to
    study signal-to-noise effects; development and testing of denoising-aware
    autoencoder architectures for Raman spectroscopy.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from aqueous sugar solutions without individual human
    identifiers.
synthetic_organic_pigments_baseline_corrected:
  rai:dataAnnotationProtocol: Pigment class labels assigned from known sample identity.
    Approximately 300 reference spectra of approximately 270 synthetic organic pigments
    (nearly 400 samples total) sourced from research institutes, manufacturers, and
    resellers. Library compiled at the Royal Institute for Cultural Heritage (KIK/IRPA),
    Brussels. Pigment classes include azo (monoazo, disazo), heterocyclic, and polycyclic
    types (phthalocyanine, quinacridone, perylene, anthraquinone, dioxazine, triarylcarbonium,
    diketopyrrole).
  rai:dataBiases: Reference library covers modern synthetic organic pigments used
    in 20th-century fine-art painting and design; historic inorganic pigments and
    natural colorants are excluded. Spectra acquired on a single instrument at KIK/IRPA;
    fluorescence and sample morphology vary across pigment classes. Class sizes are
    unequal, reflecting commercial availability. Tested for identification on four
    Stedelijk Museum paintings (Amsterdam), but broader applicability to in-situ
    measurements under different conditions has not been validated.
  rai:dataCollection: Dispersive Raman spectroscopy of synthetic organic pigment
    powders. Renishaw inVia spectrometer, Peltier-cooled CCD (203 K, 576x384 pixels),
    785 nm excitation, 1200 mm-1 grating, 50x LWD objective, wavelength calibration
    ±0.5 cm-1. Samples measured as dry powders or from original manufacturer packaging.
  rai:dataCollectionType: Laboratory reference measurements of synthetic organic
    pigment standards assembled from research institutes, commercial manufacturers,
    and resellers.
  rai:dataLimitations: Measurements represent pure pigment standards; real paintings
    contain binders, varnishes, and mixed pigment layers that alter spectra. Access
    requires direct contact with KIK/IRPA or the dataset authors; not available via
    an open API. No explicit open license was stated for this variant; users should
    verify applicable terms with the original authors.
  rai:dataPreprocessingProtocol: Baseline correction applied to remove fluorescence
    background. Exact algorithm and parameters are described in the source publication
    (Fremout et al. 2012, Journal of Raman Spectroscopy 43).
  rai:dataSocialImpact: Enables non-invasive identification of modern synthetic pigments
    in cultural heritage objects (paintings, textiles, plastics) without sampling.
    Supports provenance research, forgery detection, and conservation decision-making
    in museums and heritage institutions.
  rai:dataUseCases: Pigment identification and classification, spectral library matching,
    art conservation and authentication, benchmarking of chemometric classifiers on
    organic colorants.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from synthetic organic pigment standards without any human
    identifiers.
