itaconic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for three acid species (IA, IA⁻,
    IA²⁻) and water derived from pH-based dissociation equilibria and Indirect Hard
    Modeling (IHM). Method A uses pKa1 = 3.85, pKa2 = 5.45 (literature); method B
    estimates pKa1 = 3.68, pKa2 = 5.00 via MCR-ALS fitting (literature range 3.48–3.95
    and 4.98–5.67). Full set (22 samples) RMSECV ≤ 2.13 × 10⁻⁴ mol mol⁻¹; minimum
    set (4 samples) RMSEP < 2.87 × 10⁻⁴ mol mol⁻¹. Primary method-development case
    study of the source publication.
  rai:dataBiases: Three structurally similar species co-exist near the first dissociation
    step (pH ≈ 4.68), requiring weighted spectral subtraction to isolate individual
    species. Equal Raman activity assumed across species. Ionic strength varies during
    titration (mean ≈ 0.34 mol L⁻¹); ideal mixture assumption applied throughout.
    Data acquired at a single instrument (Kaiser RXN2, 785 nm) and temperature (25 °C).
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of itaconic acid (Alfa Aesar, ≥99%) in deionized water (0.8 μS cm⁻¹) at 25 °C
    across 22 titration steps, using a Kaiser RXN2 Raman analyzer (400 mW, 785 nm)
    with NIR fiber-optic immersion probe, spectral range 160–3285 cm⁻¹, 4 cm⁻¹ resolution,
    60 s acquisition time. Ambient light excluded by non-transparent black PVC liner.
    pH measured with SenTix 940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of diprotic itaconic acid (C₅H₆O₄)
    in aqueous solution. Three dissociation species characterised (IA, IA⁻, IA²⁻)
    across the full pH range. Key Raman bands include ν_s,C=O at 1700 cm⁻¹, ν_C=C
    at 1643 cm⁻¹, combined ν_C-O/γ_O-H around 1400 cm⁻¹, and ν_C-O at 1220 cm⁻¹.
  rai:dataLimitations: Diprotic system with two overlapping dissociation steps; species
    co-existence near pH 4.68 requires careful spectral processing. Minimum calibration
    set of 4 samples requires samples at maximum concentration of each species. Ideal
    mixture assumption applied despite ionic strength ≈ 0.34 mol L⁻¹. Models calibrated
    at 25 °C in deionized water; not directly applicable to other matrices or temperatures.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied. Evaluation range 1025–1850
    cm⁻¹, excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Two-component species
    spectra generated by weighted linear spectral subtraction (method A) or MCR-ALS
    in PEAXACT ver. 4.5 (method B). PCMs constructed with IHM using pseudo-Voigt profiles
    (9 for IA, 10 for IA⁻ and IA²⁻). Preprocessing in MATLAB R2017a and PEAXACT ver. 4.5.
  rai:dataSocialImpact: Itaconic acid is a biobased platform chemical produced by
    fungal fermentation, used as a polymer and resin precursor. Accurate inline monitoring
    of dissociation states is directly relevant to downstream crystallisation and extraction
    processes, where the dissociation state governs extraction selectivity, supporting
    optimisation of biobased chemical production.
  rai:dataUseCases: Primary reference dataset for IHM method development and benchmarking
    against PLS; minimum-sample calibration strategies (as few as 4 samples); simultaneous
    pKa estimation and spectral calibration; inline monitoring of diprotic carboxylic
    acid dissociation; PAT in itaconic acid fermentation and purification.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
