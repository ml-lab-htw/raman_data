citric_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for four acid species (CA, CA⁻,
    CA²⁻, CA³⁻) derived from pH-based dissociation equilibria and Indirect Hard Modeling
    (IHM) using reported pKa values (method A). RMSECV ranges from 2.99 × 10⁻⁴ (CA)
    to 10.13 × 10⁻⁴ mol mol⁻¹ (water); accuracy is markedly lower for CA²⁻ (8.81 × 10⁻⁴)
    and CA³⁻ (7.20 × 10⁻⁴) due to the structural similarity of these two species.
  rai:dataBiases: The high structural similarity of CA²⁻ and CA³⁻ makes their Pure
    Component Models (PCMs) nearly indistinguishable by IHM, causing systematic calibration
    errors at the higher dissociation stages. Ideal dilute mixture assumption applied
    despite activities deviating from unity at experimental concentrations. Data acquired
    at a single instrument (Kaiser RXN2, 785 nm) and temperature (25 °C).
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of citric acid (KMF Laborchemie, ≥99%) in deionized water (0.8 μS cm⁻¹) at 25 °C
    using a Kaiser RXN2 Raman analyzer (400 mW, 785 nm) with NIR fiber-optic immersion
    probe, spectral range 160–3285 cm⁻¹, 4 cm⁻¹ resolution, 60 s acquisition time.
    Ambient light excluded by non-transparent black PVC liner. pH monitored continuously
    with SenTix 940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of triprotic citric acid in
    aqueous solution. Spectra recorded at pH equilibrium over the full titration range
    for four dissociation species (CA, CA⁻, CA²⁻, CA³⁻).
  rai:dataLimitations: Quantification accuracy is significantly reduced for CA²⁻ (R²
    = 0.9225, RMSECV = 8.81 × 10⁻⁴) and CA³⁻ (R² = 0.9154, RMSECV = 7.20 × 10⁻⁴)
    due to near-identical Raman signatures; not suitable for high-precision individual
    monitoring of higher dissociation stages without additional prior information.
    Models calibrated on NaOH titration in deionized water at 25 °C; ideal mixture
    assumption not valid above 0.1 mol L⁻¹.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied. Evaluation range 1025–1850
    cm⁻¹, excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Preprocessing performed
    in MATLAB R2017a (spectral subtraction) and PEAXACT ver. 4.5 (S-PACT).
  rai:dataSocialImpact: Citric acid is widely used in food, pharmaceutical, and chemical
    industries, and is a major product of fungal fermentation. Accurate multi-stage
    dissociation monitoring enables better process control in pH-dependent extraction,
    crystallisation, and downstream purification, supporting efficient biobased production.
  rai:dataUseCases: Process monitoring in triprotic acid systems; benchmarking IHM
    for structurally similar multi-species mixtures; evaluation of limits of spectroscopic
    species discrimination; PAT in citric acid production and purification processes.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
