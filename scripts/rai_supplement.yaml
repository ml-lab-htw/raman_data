covid19_serum:
  rai:dataAnnotationProtocol: Binary COVID-19 labels (positive/negative) assigned
    by RT-PCR confirmation and ELISA serology. 20 subjects (10 RT-PCR-confirmed COVID-19
    patients and 10 healthy controls. Study conducted under Ethics Committee protocol
    26691419.6.0000.5492 (Universidade Anhembi Morumbi). Each sample measured in
    triplicate at three anatomically distinct serum positions.
  rai:dataBiases: Small cohort (20 subjects) limits statistical power; results may
    not generalise beyond this Brazilian clinical population. Equal-sized COVID-19
    and control groups simplify analysis but may not reflect true disease prevalence.
    Serum spectra are sensitive to sample handling and storage conditions not fully
    controlled across sites. Instrument-specific fluorescence background (830 nm
    excitation) and correction method (7th-order polynomial baseline) may differ
    from other published COVID-19 serum datasets.
  rai:dataCollection: Dispersive Raman spectroscopy of blood serum. Dimension P1
    spectrometer (Lambda Solutions), 830 nm excitation, 350 mW laser power, 400-1800
    cm-1 spectral window, 4 cm-1 resolution, 30 s total acquisition (3 s x 10 accumulations),
    80 µL serum in aluminium holder. Three replicate spectra per sample.
  rai:dataCollectionType: Laboratory measurements of human blood serum collected from
    clinical patients and healthy controls under an institutional ethics protocol.
  rai:dataLimitations: Twenty-subject pilot study; published discriminant model achieved
    87% sensitivity and 100% specificity using PCA-DA/PLS-DA (Chemoface, PC2+PC4+PC5+PC6).
    Performance on independent cohorts, different instruments, or other SARS-CoV-2
    variants is unknown. Access requires direct contact with the authors; the dataset
    is not available via an open API. No explicit open license was stated; CC BY 4.0
    has been assumed — users should verify terms with the original authors.
  rai:dataPreprocessingProtocol: 7th-order polynomial baseline correction applied
    to raw spectra to remove fluorescence background; spectra subsequently normalised
    by area (1-norm). Processed spectra used for PCA-DA and PLS-DA classification
    in Chemoface software.
  rai:dataSocialImpact: Demonstrates feasibility of rapid, low-cost COVID-19 screening
    from serum Raman spectra. Potential value in resource-limited settings where
    RT-PCR capacity is constrained. Clinical deployment requires large-scale validation
    and regulatory approval; findings must not be used for diagnostic decisions without
    qualified medical oversight.
  rai:dataUseCases: COVID-19 binary classification, serum biomarker discovery, PCA/PLS-DA
    benchmarking, Raman-based infectious-disease screening research.
  rai:personalSensitiveInformation: Spectra are derived from identified COVID-19 patients
    and healthy volunteers. No direct identifiers are included in the released dataset,
    but the clinical context means data should be treated as sensitive health information
    under applicable data-protection regulations (e.g., LGPD in Brazil, GDPR in the EU).
    applicable data-protection regulations.
deepr_denoising:
  rai:dataAnnotationProtocol: Each low-SNR spectrum (0.1 s integration time) is paired
    pixel-by-pixel with the corresponding high-SNR spectrum (1 s integration time)
    acquired from the same spatial location in the same hyperspectral Raman cell image.
    Ground-truth targets are defined purely by acquisition conditions; no manual annotation
    was performed.
  rai:dataBiases: All 172,312 spectral pairs originate from a single cancer cell line
    (MDA-MB-231 breast cancer) imaged on one confocal Raman system at 532 nm. The
    denoising model learns noise characteristics specific to this instrument and the
    0.1 s vs. 1 s integration-time regime; generalisation to other instruments, cell
    types, excitation wavelengths, or noise regimes requires revalidation. The 11
    cell images used for 11-fold cross-validation may not capture the full range of
    cellular morphological variability.
  rai:dataCollection: 172,312 paired low-SNR (0.1 s) and high-SNR (1 s) confocal
    Raman spectra from n=11 hyperspectral Raman cell images of MDA-MB-231 breast
    cancer cells, acquired at 532 nm excitation. Spectra cover the fingerprint region
    (~600-1800 cm-1) with key bands at 795 cm-1 (nucleic acids), 1004 cm-1
    (phenylalanine), 1300 and 1440 cm-1 (lipids), and 1660 cm-1 (amide I, proteins).
    Training augmentation included spectral flipping, shifting, and background
    subtraction.
  rai:dataCollectionType: In vitro hyperspectral confocal Raman microscopy of cultured
    MDA-MB-231 human breast cancer cells; no human subjects were involved in data
    collection.
  rai:dataLimitations: The 1D ResUNet learns noise characteristics specific to the
    acquisition instrument and the 0.1 s/1 s integration-time pairing. Performance
    on other spectrometers, sample types, or noise levels is not guaranteed without
    retraining or fine-tuning. Dataset access is via a SharePoint link provided by
    the authors rather than a stable versioned repository, which may affect long-term
    reproducibility. The 11 cell images may not represent the full biological
    variability of the cell line.
  rai:dataPreprocessingProtocol: Low-SNR (0.1 s) and high-SNR (1 s) spectra from
    the same pixel are paired directly. A 1D ResUNet was trained for 500 epochs using
    the Adam optimizer with an L1-norm loss function and a one-cycle learning rate
    scheduler. Eleven independent models were trained via 11-fold cross-validation
    (10 cell images for training/validation, 1 held-out test image per fold). The
    network achieved a mean MSE 10x lower than Savitzky-Golay filtering (mean PSNR
    45.76, mean SSIM 0.9532 across 11 test folds).
  rai:dataSocialImpact: A 10x improvement in Raman denoising over classical methods
    (Savitzky-Golay, wavelet, PCA) directly enables high-throughput label-free
    molecular imaging of cells, potentially accelerating drug screening, cancer
    diagnostics, and histopathology workflows that currently require prohibitively
    long acquisition times.
  rai:dataUseCases: Training and benchmarking 1D deep learning denoising models for
    hyperspectral Raman imaging; comparison against classical spectral filters
    (Savitzky-Golay, wavelet, PCA); component of hybrid denoising + super-resolution
    pipelines for high-throughput Raman microscopy.
  rai:personalSensitiveInformation: No personal or sensitive information. All spectra
    are from the MDA-MB-231 human breast cancer cell line cultured in vitro; no
    patient-derived primary specimens and no individual human identifiers are
    present.
deepr_super_resolution:
  rai:dataAnnotationProtocol: Low-resolution (LR) inputs are generated synthetically
    by 2x, 3x, or 4x spatial downsampling of high-resolution (HR) hyperspectral
    Raman images. HR images at native spatial resolution serve as ground-truth targets.
    No manual annotation was performed; pairing is determined entirely by the
    downsampling procedure.
  rai:dataBiases: All 169 hyperspectral images are from MDA-MB-231 breast cancer cells
    imaged on a single confocal Raman system at 532 nm. The HyRISR network learns
    spatial and spectral correlations specific to this cell line and instrument.
    At 4x super-resolution, the network introduces increased blurring that limits
    its suitability for high-resolution cellular imaging; 2x and 3x demonstrated
    better spatial fidelity. Transfer learning to tissue-engineered cartilage was
    shown (n=16 training patches), but generalisation to other tissue types or
    instruments has not been systematically benchmarked.
  rai:dataCollection: 169 hyperspectral Raman images of MDA-MB-231 breast cancer cells
    (1.4 million spectra, 389 h total acquisition) at 532 nm excitation. Each image
    contains 64x64x500 or 63x63x500 pixels (height x width x spectral channels).
    LR inputs were generated by 2x, 3x, or 4x spatial downsampling of HR acquisitions.
    Dataset split 85:10:5 (training/validation/test). Augmentation included random
    image cropping, flipping, rotation, mixup, spectral flipping, shifting, and
    background subtraction.
  rai:dataCollectionType: In vitro hyperspectral confocal Raman microscopy of cultured
    MDA-MB-231 human breast cancer cells; no human subjects were involved in data
    collection.
  rai:dataLimitations: HyRISR learns spatial correlations specific to MDA-MB-231 cells
    and the acquisition instrument. At 4x super-resolution, blurring artefacts are
    significant and reconstruction fidelity is markedly reduced compared to 2x and 3x.
    Dataset access is via a SharePoint link rather than a stable versioned repository.
    The training set of 144 images is small relative to typical RGB super-resolution
    benchmarks; extending the dataset would likely further improve performance.
  rai:dataPreprocessingProtocol: HR Raman images at native resolution are spatially
    downsampled 2x, 3x, or 4x to generate LR inputs. HyRISR (adapted RCAN
    architecture with spectral downsampling) was trained for 600 epochs using the
    Adam optimizer with L1-norm loss and a constant learning rate. Performance was
    assessed via PSNR, SSIM, and MSE against ground-truth HR images. Achieved 40x
    (2x SR), 90x (3x SR), and 160x (4x SR) imaging speed-up while preserving
    molecular spatial information.
  rai:dataSocialImpact: Enables 40-160x speed-up in hyperspectral Raman cell imaging,
    reducing acquisition times from over one hour to under one minute. This could
    make label-free molecular imaging practical for high-throughput drug screening,
    pathological tissue analysis, and cell biology studies that are currently
    prohibitively slow with conventional Raman microscopy.
  rai:dataUseCases: Training and benchmarking hyperspectral spatial super-resolution
    models (2x, 3x, 4x); comparison against nearest-neighbour and bicubic
    upsampling baselines; transfer learning to new sample types with limited training
    data; hybrid combination with spectral denoising for extreme imaging speed-ups.
  rai:personalSensitiveInformation: No personal or sensitive information. All spectra
    are from the MDA-MB-231 human breast cancer cell line cultured in vitro; no
    patient-derived primary specimens and no individual human identifiers are
    present.
diabetes_skin_ages:
  rai:dataAnnotationProtocol: Multi-class labels for advanced glycation end-product
    (AGE) signatures in diabetic vs. healthy skin. 11 DM2 patients (7 female, 49.5
    ± 6.7 years) and 9 healthy controls (7 female, 33.2 ± 4.9 years); University
    of Guanajuato, Mexico; IRB approved; all subjects provided informed consent. DM2
    diagnosis confirmed by standard clinical methods (fasting glucose; HbA1c by
    boronic acid affinity chromatography, LabonaCheck MH-200). This subset focuses
    on AGE-related spectral signatures (GOLD, MG-H2, pentosidine and precursors —
    3-deoxyglucosone, glyoxal, methylglyoxal); PCA correlation analysis with digitised
    AGE reference spectra from the literature.
  rai:dataBiases: Small cohort (20 subjects) from a single Mexican academic centre;
    generalisability to other ethnic groups, age ranges, or DM2 severity stages is
    unknown. Slight age difference between DM2 (49.5 y) and control (33.2 y) groups
    may confound AGE accumulation signals. The portable PEK-785 spectrometer (12 cm⁻¹
    resolution) limits spectral detail compared to benchtop instruments. Probe-angle
    variability at 90° and subject motion during ~15 s acquisition are potential
    sources of noise.
  rai:dataCollection: In vivo portable Raman spectroscopy on skin. PEK-785 spectrometer
    (Agiltron Inc.), 785 nm excitation, 90 mW, 200 µm spot size, 12 cm⁻¹ resolution,
    5 scans per measurement (~15 s total exposure, ANSI Z136.1 compliant). Probe
    held at 90° against the skin without exerting pressure. Sequential acquisition
    at four anatomical sites per subject (~3 min total per subject). Spectral range
    800–1800 cm⁻¹ after preprocessing.
  rai:dataCollectionType: In vivo non-invasive portable Raman spectroscopy of human
    skin, collected under an IRB-approved clinical research protocol.
  rai:dataLimitations: 20-subject pilot study; published ANN model achieved 88.9–90.9%
    DM2/Control accuracy (site-dependent), SVM 76.0–82.5%, 10-fold cross-validation.
    AGE-spectrum correlation is exploratory; causal attribution to specific molecular
    species requires further validation. Ostica Open Access Publishing Agreement
    license; dataset available via Kaggle.
  rai:dataPreprocessingProtocol: Vancouver Raman Algorithm (VRA) applied for iterative
    polynomial fluorescence background removal. Spectra cropped to 800–1800 cm⁻¹
    (AGE fingerprint region). Area-normalised (unitary area under curve). Zero-mean
    centered before classification.
  rai:dataSocialImpact: Non-invasive skin Raman spectroscopy has the potential to
    provide a low-cost, painless screening tool for type 2 diabetes — particularly
    valuable in resource-limited settings where laboratory glucose testing is inaccessible.
    Clinical deployment requires large-scale multicentre validation and regulatory
    approval.
  rai:dataUseCases: DM2 vs. healthy classification, AGE biomarker correlation, non-
    invasive glucose-proxy screening, portable Raman benchmarking, ANN/SVM comparison
    on small clinical datasets.
  rai:personalSensitiveInformation: Spectra acquired in vivo from human subjects
    under an IRB-approved protocol. No direct identifiers in the dataset, but the
    medical context (diabetes status, age, sex) means data should be treated as
    sensitive health information under applicable data-protection regulations (e.g.,
    LFPDPPP in Mexico, GDPR in the EU).
