flow_microgel_synthesis:
  rai:dataAnnotationProtocol: NIPAM weight fraction (w_NIPAM) ground truth derived
    from inline Raman spectra using an Indirect Hard Modeling (IHM) calibration model
    with RMSECV = 0.037 wt-%. Microgel hydrodynamic radius measured offline by Dynamic
    Light Scattering (DLS) on a Zetasizer Ultra (Malvern Panalytical) at 50 °C and
    90° scattering angle (4 measurements per sample). Data points with polydispersity
    index (PDI) > 0.6 or relative size error > 3.8% were excluded.
  rai:dataBiases: Data originate from a single tubular glass flow reactor setup; results
    may not transfer directly to different reactor geometries or scales. The Gaussian
    Process surrogate model used in the optimization loop exhibits high variance in
    sparsely sampled regions, which may bias the acquisition function toward unexplored
    but unreliable conditions. Offline DLS reference measurements prevent fully autonomous
    closed-loop optimization and introduce a latency between Raman monitoring and size
    feedback.
  rai:dataCollection: Inline Raman spectra acquired with a Kaiser RXN2 spectrometer
    using HoloGRAMS software (40 s acquisition time) at reaction temperature inside
    a tubular glass flow reactor. The reactor feed consists of a monomer solution
    (110.6 mmol/L NIPAM, 2.7 mmol/L BIS crosslinker, 0.41 mmol/L CTAB surfactant)
    and an initiator solution (1.5 mmol/L AMPA), both nitrogen-degassed. Process
    variables are initiator flow (0.1–0.9 mL/min), monomer flow (2–18 mL/min),
    CTAB concentration (0.14–0.41 mmol/L), and temperature (60–80 °C). A Latin
    Hypercube Sampling (LHS) initial design of 15 experiments was followed by 11
    TS-EMO optimization iterations of 5 experiments each.
  rai:dataCollectionType: Inline process Raman measurements during flow synthesis of
    N-isopropylacrylamide (NIPAM) microgels by precipitation polymerization, combined
    with offline DLS size characterization. Dataset collected as part of a hardware-in-the-loop
    Bayesian optimization campaign.
  rai:dataLimitations: The IHM Raman model and GP surrogate are valid only within
    the explored process variable ranges; extrapolation beyond the design space is
    unreliable. Only a single reactor configuration was studied. The dataset represents
    a relatively small number of experiments (approx. 70 total), limiting the density
    of coverage across the four-dimensional input space.
  rai:dataPreprocessingProtocol: Raman spectra evaluated with an IHM calibration model
    developed in HoloGRAMS. Microgel size data preprocessed by filtering out samples
    with PDI > 0.6 (indicating failed microgel formation or hydrogel) and those with
    relative DLS size error > 3.8%. Product flow rate computed from NIPAM conversion
    and feed flows; size deviation target defined as squared difference from 100 nm
    radius.
  rai:dataSocialImpact: Enables data-driven optimization of colloidal microgel synthesis
    in continuous flow, supporting scalable production of responsive hydrogel particles
    for drug delivery, diagnostics, and smart material applications. Demonstrates
    hardware-in-the-loop Bayesian optimization as a strategy for autonomous process
    development in chemical engineering.
  rai:dataUseCases: Multi-objective Bayesian optimization of flow synthesis processes;
    GP surrogate modeling for process variable screening; inline Raman monitoring
    of polymerization reactions; PAT-enabled continuous manufacturing; development
    of hardware-in-the-loop optimization frameworks for chemical production.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All data originate from chemical process measurements without individual human
    identifiers.
formic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for two acid species (FA, FA⁻)
    derived from pH-based dissociation equilibria and Indirect Hard Modeling (IHM).
    Method A uses reported pKa values; method B estimates pKa = 3.59 via MCR-ALS and
    IHM fitting (close to literature). Calibration validated with leave-10%-out cross-validation;
    RMSECV ≤ 2.61 × 10⁻⁴ mol mol⁻¹.
  rai:dataBiases: Spectra collected under ideal dilute mixture assumption (activity
    coefficients = 1) at a single instrument (Kaiser RXN2, 785 nm) and temperature
    (25 °C); models may not transfer without recalibration. Monoprotic system covers
    only two species (FA, FA⁻). Acid purity 98–100% (Merck); trace impurities may
    contribute minor spectral artefacts.
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of formic acid (Merck, 98–100%) in deionized water (0.8 μS cm⁻¹) at 25 °C using
    a Kaiser RXN2 Raman analyzer (400 mW, 785 nm) with NIR fiber-optic immersion probe,
    spectral range 160–3285 cm⁻¹, 4 cm⁻¹ resolution, 60 s acquisition time. Ambient
    light excluded by non-transparent black PVC liner. pH monitored continuously with
    SenTix 940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of monoprotic formic acid (HCOOH)
    in aqueous solution. Spectra recorded at pH equilibrium across the full titration
    range for two dissociation species (FA, FA⁻).
  rai:dataLimitations: Models calibrated on NaOH titration in deionized water at 25 °C;
    not directly applicable to complex matrices, elevated temperatures, or concentrations
    outside calibration range. Ideal mixture assumption not strictly valid above 0.1
    mol L⁻¹. Extrapolation to other instruments requires recalibration.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied. Evaluation range 1025–1850
    cm⁻¹, excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Preprocessing in MATLAB
    R2017a (spectral subtraction) and PEAXACT ver. 4.5 (S-PACT).
  rai:dataSocialImpact: Formic acid is a C1 platform chemical with applications in
    hydrogen storage, biomass conversion, and preservation. Inline monitoring of its
    dissociation state supports real-time optimisation of synthesis and separation
    processes in the biobased chemical industry and electrochemical CO₂ reduction.
  rai:dataUseCases: Inline monitoring of monoprotic acid dissociation in aqueous solution;
    validation case for the method B (unknown pKa) approach; IHM vs. PLS benchmarking;
    PAT in formic acid production and biobased acid separation processes.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
