hair_dyes_sers:
  rai:dataAnnotationProtocol: Class labels assigned based on known a priori identity
    of each commercial hair colorant. Four hierarchical label sets are provided -
    individual colorant (33 classes), brand (4 classes - Ion, Wella, Clairol, L'Oreal),
    permanency type (3 classes - permanent, semi-permanent, demi-permanent), and
    hair color (7 classes - auburn, brown, black, blue, purple, pink, red). Labels
    were confirmed by product packaging and visual inspection of color. No independent
    chemical analysis of colorant composition was performed for label assignment.
  rai:dataBiases: All spectra collected from blonde Caucasian hair obtained from a
    single anonymous donor at one hair salon; results may not generalise to other
    hair colors, hair types, or donors of different racial, gender, or age backgrounds.
    Uncolored hair exhibits no SERS signal with AuNRs (no protein detected by this
    substrate), making the approach specific to colored hair only. Only 4 commercial
    brands (Ion, Wella, Clairol, L'Oreal) and 33 colorants from a single retail
    outlet (Sally Beauty Supply, College Station TX) are represented; other brands
    and formulations are not covered. Misclassifications occurred between colorants
    sharing similar molecular formulations (e.g., Clairol semi-permanent black and
    demi-permanent brown reached only 72% TPR). Hair samples were stored for at
    most 1 month before analysis; the effect of longer storage, sun exposure, or
    washing routines on SERS signal readability has not been investigated.
  rai:dataCollection: SERS spectra of dye-treated human hair acquired on a TE-2000U
    Nikon inverted confocal microscope with a 20x objective. Excitation at 785 nm
    (1.8 mW solid-state laser); scattered light directed via a 50/50 beam splitter
    into an IsoPlane-320 spectrometer (Princeton Instruments, 600 groove/mm grating)
    with a PIX-400BR CCD detector and Semrock LP03-785RS-25 long-pass filter.
    Acquisition time approximately 60 s per spectrum. SERS substrate was 5 µL of
    gold nanorod (AuNR) solution applied directly on hair placed on a glass coverslip;
    AuNRs synthesised by laser ablation in solution following Esparza et al. Raw
    spectra provided with no corrections or smoothing applied; photodegradation
    absence verified by consecutive 1-min exposure measurements. Blonde Caucasian
    hair from a single anonymous donor was dyed with each of 33 commercial colorants
    from 4 brands (Ion, Wella, Clairol, L'Oreal) spanning 7 colors and 3 permanency
    types; 50 SERS spectra collected per colorant class, yielding 1,650 spectra total.
  rai:dataCollectionType: SERS measurements on dye-treated human hair samples using
    gold nanorod substrates, designed to benchmark SERS-based forensic identification
    of commercial hair colorants by brand, permanency type, and hair color.
  rai:dataLimitations: Only 50 spectra per class limits statistical power and
    sensitivity to AuNR batch-to-batch variability. Results are specific to blonde
    Caucasian hair; hair biology (melanin content, cuticle structure) varies by
    donor, race, and age, and robustness across demographics has not been established.
    Only 33 of the many commercially available colorants are included; new market
    products cannot be classified without model retraining. The effect of environmental
    exposure (sunlight, repeated washing, chemical treatments) on SERS signal
    stability has not been characterised. Data were originally available upon request
    only, not openly released at time of publication.
  rai:dataPreprocessingProtocol: Raw SERS spectra acquired with no corrections or
    smoothing. PLS-DA preprocessing applied in PLS_Toolbox (Eigenvector Research
    Inc) in MATLAB, with separate preprocessing pipelines per task. For brand and
    type classification, spectra were baselined to second order, area normalised,
    and mean centred. For color classification, spectra were additionally subjected
    to a first derivative (filter length 15, second polynomial order) before area
    normalisation and mean centring. A 66%/34% calibration/validation split was
    used (approximately 33 training and 17 test spectra per class). PLS-DA models
    used 14, 13, 11, and 15 principal components for the individual colorant, brand,
    type, and color tasks respectively.
  rai:dataSocialImpact: Demonstrates that SERS can provide highly accurate forensic
    analysis of hair dye evidence, enabling identification of the brand, permanency
    type, and color of a colorant present on a hair sample regardless of visual
    appearance. Average individual colorant identification accuracy of 97%, with
    near-perfect brand and color-type discrimination, supports development of
    portable SERS-based forensic tools for rapid in-situ crime scene analysis.
  rai:dataUseCases: Forensic identification of hair colorant brand, permanency type,
    and color from hair SERS spectra; benchmarking PLS-DA and other multivariate
    classifiers for multi-label SERS-based hair forensics; development of SERS
    spectral libraries for hair dye identification; evaluation of AuNR-based SERS
    substrates for analysis of biological samples.
  rai:personalSensitiveInformation: Spectra were acquired from dye-treated human
    hair. The hair donor is anonymous (single salon source, College Station TX)
    and no personally identifiable information is included in the dataset. However,
    as human biological material, the hair carries intrinsic donor characteristics
    (race, sex, age) that are not separately disclosed; spectral features may
    partially reflect donor biology in addition to hair dye composition.
head_neck_cancer:
  rai:dataAnnotationProtocol: Class labels (HNC squamous cell carcinoma vs. benign
    control) were assigned based on confirmed clinical diagnosis for each of the 53
    patients (34 cancer, 19 benign) recruited at the UC Davis Department of Otolaryngology
    under IRB approval no. 930499-8. Blood plasma and saliva were collected from each
    participant; a biofluid-stitching step concatenated the mean plasma and mean saliva
    spectra into a single unified spectrum per patient for combined-biofluid classification.
  rai:dataBiases: The cohort is limited to 53 patients from a single academic medical
    centre (UC Davis), which may not reflect the spectral variability encountered in
    broader or more diverse populations. The class ratio (34 cancer vs. 19 benign) is
    moderately imbalanced. All measurements were made on a single custom-built confocal
    Raman microscope at 785 nm excitation; spectral signatures are therefore instrument-
    and protocol-specific and may not transfer directly to other instruments without
    recalibration. Both native (wet) and dried biofluid conditions were measured, but
    best classification performance is reported only for dried samples under a specific
    quadratic discriminant model.
  rai:dataCollection: Raman spectra were acquired with a custom-built inverted confocal
    Raman microscope (Olympus IX73, 60x, 1.2 NA water-immersion objective) at 785 nm
    excitation, 65 mW laser power, 30 s exposure, using an Andor Kymera-3281-C
    spectrophotometer with a Newton DU920P-BR-DD CCD detector (Solis software). Five
    randomly sampled regions were measured per substrate for each biofluid type (blood
    plasma and saliva) under both native (wet) and dried conditions.
  rai:dataCollectionType: Clinical liquid-biopsy study; blood plasma and saliva collected
    from 53 patients at a hospital outpatient setting under informed consent and IRB
    approval (UC Davis IRB no. 930499-8).
  rai:dataLimitations: Models trained on this dataset are specific to the instrument,
    substrate preparation, and patient population used in the original study; external
    validation on independent cohorts and different Raman systems is required before
    any clinical use. The biofluid-stitching augmentation introduces a data-fusion
    step whose generalisation properties are not yet established. GC-MS metabolite
    assignments are provided as supporting evidence but are not part of the spectral
    data itself.
  rai:dataPreprocessingProtocol: Raw spectra underwent spectral cropping to the
    informative fingerprint region, PLS baseline correction, Savitzky-Golay smoothing,
    unit (min-max) normalisation, and cosmic-ray removal. For the combined-biofluid
    analysis, the mean spectrum of each biofluid was computed per patient and the two
    mean vectors were concatenated to form a stitched spectrum spanning indices 1-1694.
    Classification was performed with PLS-DA and LDA/QDA over PC1-PC5 combinations
    in MATLAB R2021a.
  rai:dataSocialImpact: A non-invasive, liquid-biopsy Raman approach to head-and-neck
    cancer screening could reduce the need for invasive biopsies and enable earlier
    detection, with potential benefit in resource-limited healthcare settings. The
    reported combined sensitivity of 96.3 % and specificity of 85.7 % are promising
    but require independent clinical validation before any diagnostic use. Misclassification
    in a cancer-screening context carries serious patient-safety implications, so the
    dataset and any derived models should only be used for research and must be reviewed
    by qualified clinicians before informing medical decisions.
  rai:dataUseCases: Development and benchmarking of Raman-based liquid-biopsy classifiers
    for head-and-neck cancer; multimodal biofluid fusion strategies; PLS-DA and
    dimensionality-reduction method comparison; spectral preprocessing evaluation;
    metabolomic-spectroscopic correlation studies.
  rai:personalSensitiveInformation: Spectra are derived from blood plasma and saliva
    of cancer patients and healthy controls. No direct patient identifiers are included
    in the released data, but the measurements constitute sensitive health-related
    information (cancer status). Data were collected under IRB approval and informed
    consent; users must comply with applicable data-protection regulations (e.g.,
    HIPAA, GDPR) and must not attempt to re-identify individual donors.
