bacteria_identification:
  rai:dataAnnotationProtocol: Species and antibiotic-treatment labels assigned based
    on known sample identity (30 bacterial/yeast isolates from clinical collections);
    60,000 reference spectra (2,000 per isolate across three measurement time-points).
    Clinical validation performed on 50 patients at Stanford University Medical Center
    and Palo Alto VA Hospital.
  rai:dataBiases: Spectra collected under standardised laboratory conditions (Horiba
    LabRAM HR Evolution, 633 nm, 13.17 mW, 300 l/mm grating, 1 s integration, gold-coated
    silica substrates). Performance may degrade for isolates, antibiotic regimens,
    or clinical environments not represented in the reference library. The 30-isolate
    set covers common pathogens but is not exhaustive. SNR of approximately 4.1 was
    measured at 1 s integration time.
  rai:dataCollection: Surface-enhanced Raman scattering (SERS) spectra acquired on
    gold-coated silica substrates (200 nm Au by electron beam evaporation). Horiba
    LabRAM HR Evolution spectrometer, 633 nm excitation, 13.17 mW laser power, 300
    l/mm diffraction grating, 1.2 cm-1 dispersion, Olympus MPLAN 100x objective (NA
    0.9), approximately 1 µm spot size, 1 s integration time per spectrum.
  rai:dataCollectionType: Laboratory measurements of bacterial and yeast cells on SERS
    substrates, plus clinical validation measurements from patient isolates.
  rai:dataLimitations: The 30-isolate reference library covers common nosocomial pathogens
    but may not generalise to rare or emerging species. Performance on clinical isolates
    is validated for MRSA/MSSA identification (89.1 ± 0.1% accuracy) and antibiotic
    treatment classification (97.0 ± 0.3% with a single spectrum; 99.7% with 10 spectra).
    Transfer to instruments with different excitation wavelengths or substrate chemistries
    requires re-calibration. No explicit license was stated by the original data providers;
    CC BY 4.0 has been assumed.
  rai:dataPreprocessingProtocol: Spectra are provided as raw SERS intensities. Labels
    encode isolate identity and antibiotic treatment status. The published CNN model
    uses a 25-layer 1D ResNet trained with Adam optimiser (betas 0.5/0.999), batch
    size 10, without explicit spectral preprocessing — no baseline correction or
    normalisation is described in the paper.
  rai:dataSocialImpact: Rapid, culture-free bacterial identification directly from
    patient samples could reduce time-to-treatment from days to hours, with particular
    impact on sepsis management and antibiotic stewardship. Clinical deployment requires
    regulatory approval and validation by qualified healthcare professionals.
  rai:dataUseCases: Bacterial species identification, antibiotic susceptibility prediction,
    MRSA/MSSA discrimination, clinical diagnostics decision support, deep learning
    benchmarks for spectral classification.
  rai:personalSensitiveInformation: Clinical validation spectra were derived from patient
    isolates at Stanford University Medical Center and Palo Alto VA Hospital. No direct
    patient identifiers are included in the released dataset, but the clinical context
    means data should be treated as potentially sensitive health-related information
    under applicable data-protection regulations.
