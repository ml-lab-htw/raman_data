levulinic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for acid species derived from
    pH-based dissociation equilibria and Indirect Hard Modeling (IHM), following the
    same methodology established for itaconic, formic, acetic, and citric acid in
    the source publication (DOI 10.1177/0003702820973275). Levulinic acid is monoprotic
    (pKa ≈ 4.59); two species (LA, LA⁻) are present in the titration data. Detailed
    accuracy metrics for levulinic acid are not reported in the main paper.
  rai:dataBiases: Spectra collected under ideal dilute mixture assumption (activity
    coefficients = 1) at a single instrument (Kaiser RXN2, 785 nm) and temperature
    (25 °C). Monoprotic system covers only two species (LA, LA⁻). Levulinic acid data
    is part of the extended dataset repository but not the primary focus of the source
    publication.
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of levulinic acid in deionized water (0.8 μS cm⁻¹) at 25 °C using a Kaiser RXN2
    Raman analyzer (400 mW, 785 nm) with NIR fiber-optic immersion probe, spectral
    range 160–3285 cm⁻¹, 4 cm⁻¹ resolution, 60 s acquisition time. Ambient light
    excluded by non-transparent black PVC liner. pH monitored continuously with SenTix
    940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of monoprotic levulinic acid
    (C₅H₈O₃) in aqueous solution. Spectra recorded at pH equilibrium across the full
    titration range for two dissociation species (LA, LA⁻).
  rai:dataLimitations: Detailed calibration accuracy metrics not reported in the main
    paper (Echtermeyer et al., 2021); refer to the dataset repository for further
    details. Models calibrated on NaOH titration in deionized water at 25 °C only;
    ideal mixture assumption not strictly valid above 0.1 mol L⁻¹. Extrapolation to
    other instruments or process matrices requires recalibration.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied, following the same protocol
    as for the other acid species in this collection. Evaluation range 1025–1850 cm⁻¹,
    excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Preprocessing in MATLAB R2017a
    and PEAXACT ver. 4.5 (S-PACT).
  rai:dataSocialImpact: Levulinic acid is a renewable platform chemical derived from
    lignocellulosic biomass, with applications in biofuels, pharmaceuticals, and polymer
    synthesis. Inline dissociation monitoring supports optimisation of pH-dependent
    separation and purification processes in biorefineries.
  rai:dataUseCases: Inline monitoring of monoprotic carboxylic acid dissociation in
    aqueous solution; PAT in levulinic acid production from biomass; IHM and chemometric
    model development for biobased acid systems.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
microgel_size_lf_fingerprint:
  rai:dataAnnotationProtocol: Target values are hydrodynamic diameters (nm) measured
    by Dynamic Light Scattering (DLS) via Zetasizer Ultra (Malvern Panalytical) at
    20 °C and scattering angle 90°, each repeated 4 times and analysed with ZS Xplorer
    software. DLS precision is approximately ±2%. The source publication used 40 training
    samples and 7 test samples.
  rai:dataBiases: Offline measurements at 20 °C (microgels in swollen state) may not
    transfer to inline predictions at reaction temperatures (60–80 °C, collapsed state).
    Two distinct spectral clusters exist in the raw data attributed to different synthesis
    conditions. Multiple factors beyond particle size influence Raman spectra (monomer,
    inhibitor, surfactant concentrations). Small dataset (47 samples) limits statistical
    robustness and generalisability.
  rai:dataCollection: Offline Raman spectra of 47 N-isopropylacrylamide (NIPAM) microgel
    samples acquired at 20 °C in glass vials (identical fluid level) over two experimentation
    days without prior filtration or dialysis, using a Kaiser RXN2 Raman Analyzer
    with 40 s acquisition time; each sample measured three times. Microgels synthesised
    in a continuous flow reactor at varying temperature, flow rate, initiator, and
    surfactant concentrations.
  rai:dataCollectionType: Offline Raman spectroscopy for prediction of hydrodynamic
    diameter of monodisperse cross-linked poly(N-isopropylacrylamide) (PNIPAM) microgels
    (208–483 nm, PDI < 0.368) synthesised in continuous flow. Fingerprint spectral
    region (850–1800 cm⁻¹) with atmospheric O₂ signal (1552–1560 cm⁻¹) excluded.
  rai:dataLimitations: Small dataset (47 samples) is a restrictive factor; authors
    state findings cannot be generalised beyond the employed data sets. Samples from
    a single continuous flow reactor (RWTH Aachen University); generalisability to
    other reactor types or polymer systems not demonstrated. Offline measurements at
    20 °C may not directly apply to inline process conditions at reaction temperature.
  rai:dataPreprocessingProtocol: Linear fit baseline correction applied to fingerprint
    region spectra (850–1800 cm⁻¹). A linear function is fitted to the spectral baseline
    and subtracted. No normalisation applied. Fingerprint region excludes the atmospheric
    O₂ signal (1552–1560 cm⁻¹). Pretreated data published at DOI 10.18154/RWTH-2023-05604.
  rai:dataSocialImpact: Enables data-driven polymer particle size monitoring from
    Raman spectroscopy, circumventing labor-intensive offline DLS measurements. Supports
    closed-loop control of polymerisation processes, contributing to consistent product
    quality in polymer manufacturing and potential application to crystallisation processes.
  rai:dataUseCases: Microgel particle size prediction from Raman spectra; benchmarking
    nonlinear manifold learning (diffusion maps, Y-shaped autoencoders) against PLS
    and IHM+PLS baselines; dimensionality reduction for high-dimensional spectroscopic
    data; PAT for particle size monitoring in continuous polymer synthesis.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
