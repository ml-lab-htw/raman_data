    acid measured in isolation — simultaneous multi-analyte elution not covered.
    Phenylalanine injected at 55 mM (lower than glycine/leucine at 100 mM), making
    analyte detection more challenging relative to solvent background. arXiv preprint
    — findings not yet peer-reviewed at time of dataset release.
  rai:dataCollection: Liquid chromatography coupled Raman spectroscopy (LC-Raman)
    with vertical flow method. Mobile Raman probe attached to HPLC system (hydrophobic
    resin column, H₂O to acetonitrile gradient, 7 mL/min flow rate, 50 µL injection).
    Time-resolved acquisition at 0.2 s exposure per spectrum frame (~100 frames per
    20 s window per elution peak).
  rai:dataCollectionType: Time-resolved LC-Raman spectroscopy of amino acid solutions
    in a liquid chromatography flow cell.
  rai:dataLimitations: Small benchmark dataset covering only four amino acids in
    single-analyte conditions. The detection challenge arises from millimolar analyte
    concentrations against a strong H₂O/ACE solvent background. No explicit license
    stated; CC BY 4.0 assumed — verify with original authors.
  rai:dataPreprocessingProtocol: Fluorescence background removed by asymmetric polynomial
    fitting at each time step. Solvent spectrum (H₂O/ACE) removed by linear regression.
    Savitzky-Golay filter applied for smoothing. Resulting time-frequency matrix used
    directly for unsupervised algorithm benchmarking.
  rai:dataSocialImpact: LC-Raman with vertical flow enables real-time, label-free
    detection of analytes in chromatographic separations without destructive sampling.
    Applications include pharmaceutical process monitoring, metabolomics, and inline
    quality control in biomanufacturing.
  rai:dataUseCases: Benchmarking time-resolved analyte detection algorithms, unsupervised
    elution peak detection, PCA/NMF/MCR-ALS dimensionality reduction, LC-Raman method
    development.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from pure amino acid aqueous solutions without any human
    identifiers.
amino_acids_tryptophan:
