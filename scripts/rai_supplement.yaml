illicit_adulterants_ft_raman:
  rai:dataAnnotationProtocol: Compound identity labels assigned from known analytical-grade
    reference standards (purchased from Biosynth International and Sigma-Aldrich).
    23 pharmaceutically active adulterants selected based on RASFF portal alerts for
    dietary supplements in the EU. Spectra of 11 SERS-active compounds recorded at
    1 mg/mL in ethanol; library built in MISA Cal software for HQI-based matching.
  rai:dataBiases: Library spectra represent pure analytical-grade standards dissolved
    in ethanol; real dietary supplement matrices contain excipients (microcrystalline
    cellulose, magnesium stearate, silicon dioxide, hydroxypropyl methylcellulose,
    titanium oxide) and plant-based extracts that can overlap with adulterant signals.
    The 23-compound panel covers RASFF-flagged targets but not all possible novel
    synthetic analogues or undeclared substances. FT-Raman at 1064 nm minimises
    fluorescence but differs from portable SERS; spectral transfer between instruments
    requires re-calibration.
  rai:dataCollection: Benchtop FT-Raman spectroscopy. Bruker RAM II FT-IR Raman module
    coupled to FT-IR VERTEX 70 spectrometer, 1064 nm excitation, 300 mW laser power,
    50–3600 cm-1, 4 cm-1 resolution, 32 scans averaged per spectrum, data acquired
    in OPUS software v7.2. Pure adulterant powders (n=19) and liquids (n=4) measured
    directly; library spectra at 1 mg/mL in ethanol.
  rai:dataCollectionType: Laboratory reference spectroscopy of pure pharmaceutical
    compounds and commercially sourced dietary supplement products for food-fraud
    screening research.
  rai:dataLimitations: Small spectral library (11 SERS-active reference compounds,
    one spectrum per compound); insufficient for training data-driven models without
    augmentation. Spectra represent ideal pure-compound conditions; detection performance
    in real DS matrices is limited by excipient interference and low analyte concentrations
    (LOI 0.1–5.0% w/w). Dataset does not cover SERS-inactive adulterants (AND, DMAA,
    DMAE, DMBA, TSIL, VAR, XAN) or structural analogues without reference standards.
  rai:dataPreprocessingProtocol: Spectra provided as raw FT-Raman intensities. Three
    replicate spectra per sample were recorded and averaged in the subsequent analysis
    step. No explicit baseline correction or normalisation described for the library
    spectra; statistical correspondence scores computed via Pearson correlation on
    first-derivative spectra using the pracma R package.
  rai:dataSocialImpact: Enables rapid, portable screening for undeclared pharmaceutically
    active adulterants in dietary supplements at customs, retail inspections, and border
    control without skilled operators or lengthy sample preparation. Supports EU RASFF
    compliance and consumer safety enforcement. Low specificity of SERS benefits
    detection of newly synthesised structural analogues where reference standards
    are unavailable.
  rai:dataUseCases: Spectral library matching for compound identification, food-fraud
    detection in dietary supplements, benchmarking of SERS vs. FT-Raman performance,
    reference spectra for adulterant screening algorithms.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra are from pure analytical-grade chemical standards and commercial
    dietary supplement products without any human identifiers.
illicit_adulterants_sers:
  rai:dataAnnotationProtocol: Compound identity labels assigned from known analytical-grade
    reference standards. 11 SERS-active adulterants (out of 23 tested) selected for
    library building based on confirmed SERS activity on silver printed-SERS substrates —
    acetildenafil, fluoxetine HCl, homo sildenafil, melatonin, phenethylamine, piperin,
    sildenafil citrate, synephrine, thiosildenafil, vardenafil HCl, vinpocetine.
    Enhancement factors 10³–10⁴ confirmed. Library built in MISA Cal software; HQI
    similarity scores used for identification (red >0.95, orange >0.85, yellow >0.75).
  rai:dataBiases: Library spectra represent pure analytical-grade standards in ethanol;
    real dietary supplement excipients and plant-based extracts may interfere. The
    11-compound panel is limited to SERS-active RASFF-flagged targets; novel analogues
    or SERS-inactive compounds cannot be identified from this library alone. Silver
    p-SERS substrates are single-use and non-reusable; SERS substrate batch variability
    can affect reproducibility. Gold p-SERS substrates also tested for SERS-inactive
    compounds.
  rai:dataCollection: Portable SERS spectroscopy. Metrohm Instant SERS analyzer (MISA),
    785 nm ± 0.5 nm excitation, Orbital Raster Scan (ORS™) technology, 30 µm spot
    continuously rasterised over ~2 mm diameter, 400–2300 cm-1, 8 cm-1 FWHM resolution,
    100 mW laser power, 3 scans averaged per spectrum, silver printed-SERS (p-SERS)
    substrates, ASTM 1840 calibration standard. Sample prep — 10 mg dissolved
    in 100 µL ethanol, vortex 20 s, centrifuge 806,400 RCF for 2 min, 10 µL supernatant
    pipetted onto silver p-SERS strip, dried 15 min, measured in triplicate.
  rai:dataCollectionType: Portable surface-enhanced Raman spectroscopy of pure pharmaceutical
    compounds and artificially adulterated dietary supplement formulations for rapid
    food-fraud field screening.
  rai:dataLimitations: Small SERS library (11 reference compounds); insufficient for
    data-driven ML without augmentation. LOI for adulteration detection is 0.1–5.0%
    w/w in commercial dietary supplements (18 commercial products tested). SERS-inactive
    compounds (AND, DMAA, DMAE, DMBA, TSIL, VAR, XAN) cannot be identified with this
    method and require the complementary FT-Raman dataset. Substrate adsorption
    selectivity and solubility in ethanol affect SERS activity per compound.
  rai:dataPreprocessingProtocol: SERS spectra acquired via MISA Cal software in Smart
    Acquire mode (laser power level 5, auto-integration, averages of 3 scans, raster
    on). HQI matching performed against the built spectral library. Secondary Pearson
    correlation analysis performed in R (prospectr, signal, Rtools packages) on first-
    derivative spectra. No explicit baseline correction described for the library
    spectra; raw spectra with three replicates per adulteration level.
  rai:dataSocialImpact: Enables customs inspectors and food safety officers to perform
    on-site screening of dietary supplements for undeclared pharmaceutical adulterants
    within 20 minutes, with no skilled operators required. Developed in collaboration
    with the Dutch Food and Consumer Product Safety Authority. Supports EU RASFF
    rapid alert enforcement and consumer protection from unsafe supplement adulteration.
  rai:dataUseCases: Portable SERS spectral library matching, dietary supplement food-fraud
    screening, adulterant identification, benchmarking of portable vs. benchtop Raman
    performance, detection-limit studies for pharmaceutical compound mixtures.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra are from pure analytical-grade chemical standards and commercial
    dietary supplement products without any human identifiers.
itaconic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for three acid species (IA, IA⁻,
    IA²⁻) and water derived from pH-based dissociation equilibria and Indirect Hard
    Modeling (IHM). Method A uses pKa1 = 3.85, pKa2 = 5.45 (literature); method B
    estimates pKa1 = 3.68, pKa2 = 5.00 via MCR-ALS fitting (literature range 3.48–3.95
    and 4.98–5.67). Full set (22 samples) RMSECV ≤ 2.13 × 10⁻⁴ mol mol⁻¹; minimum
    set (4 samples) RMSEP < 2.87 × 10⁻⁴ mol mol⁻¹. Primary method-development case
    study of the source publication.
  rai:dataBiases: Three structurally similar species co-exist near the first dissociation
    step (pH ≈ 4.68), requiring weighted spectral subtraction to isolate individual
    species. Equal Raman activity assumed across species. Ionic strength varies during
    titration (mean ≈ 0.34 mol L⁻¹); ideal mixture assumption applied throughout.
    Data acquired at a single instrument (Kaiser RXN2, 785 nm) and temperature (25 °C).
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of itaconic acid (Alfa Aesar, ≥99%) in deionized water (0.8 μS cm⁻¹) at 25 °C
    across 22 titration steps, using a Kaiser RXN2 Raman analyzer (400 mW, 785 nm)
    with NIR fiber-optic immersion probe, spectral range 160–3285 cm⁻¹, 4 cm⁻¹ resolution,
    60 s acquisition time. Ambient light excluded by non-transparent black PVC liner.
    pH measured with SenTix 940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of diprotic itaconic acid (C₅H₆O₄)
    in aqueous solution. Three dissociation species characterised (IA, IA⁻, IA²⁻)
    across the full pH range. Key Raman bands include ν_s,C=O at 1700 cm⁻¹, ν_C=C
    at 1643 cm⁻¹, combined ν_C-O/γ_O-H around 1400 cm⁻¹, and ν_C-O at 1220 cm⁻¹.
  rai:dataLimitations: Diprotic system with two overlapping dissociation steps; species
    co-existence near pH 4.68 requires careful spectral processing. Minimum calibration
    set of 4 samples requires samples at maximum concentration of each species. Ideal
    mixture assumption applied despite ionic strength ≈ 0.34 mol L⁻¹. Models calibrated
    at 25 °C in deionized water; not directly applicable to other matrices or temperatures.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied. Evaluation range 1025–1850
    cm⁻¹, excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Two-component species
    spectra generated by weighted linear spectral subtraction (method A) or MCR-ALS
    in PEAXACT ver. 4.5 (method B). PCMs constructed with IHM using pseudo-Voigt profiles
    (9 for IA, 10 for IA⁻ and IA²⁻). Preprocessing in MATLAB R2017a and PEAXACT ver. 4.5.
  rai:dataSocialImpact: Itaconic acid is a biobased platform chemical produced by
    fungal fermentation, used as a polymer and resin precursor. Accurate inline monitoring
    of dissociation states is directly relevant to downstream crystallisation and extraction
    processes, where the dissociation state governs extraction selectivity, supporting
    optimisation of biobased chemical production.
  rai:dataUseCases: Primary reference dataset for IHM method development and benchmarking
    against PLS; minimum-sample calibration strategies (as few as 4 samples); simultaneous
    pKa estimation and spectral calibration; inline monitoring of diprotic carboxylic
    acid dissociation; PAT in itaconic acid fermentation and purification.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
kaiser_ecoli_fermentation:
  rai:dataAnnotationProtocol: Ground-truth target values measured by validated reference
    analytical methods (e.g., enzymatic assays, dynamic light scattering, gas chromatography,
    or DFT computation).
  rai:dataBiases: Data were acquired under controlled laboratory conditions and may
    not generalise to field or clinical settings. Spectral profiles are influenced
    by instrument-specific factors (laser wavelength, detector type, optical path
    length, integration time). Class imbalances may be present in classification datasets.
  rai:dataCollection: Raman spectra were acquired experimentally using a laser spectrometer.
    Each spectrum represents the scattered light intensity as a function of Raman
    shift (cm⁻¹).
  rai:dataCollectionType: Laboratory measurements on biological materials including
    microorganisms, cell cultures, fermentation broths, and plant material.
  rai:dataLimitations: 'Spectral signatures are process- and instrument-specific;
    calibration transfer to other setups requires additional validation. Note: No
    explicit license was stated by the original data providers; CC BY 4.0 has been
    assumed. Users should verify the applicable terms with the original authors.'
  rai:dataPreprocessingProtocol: Spectra may have undergone baseline correction, smoothing,
    normalisation, and wavenumber calibration. Exact steps are described in the accompanying
    publication.
  rai:dataSocialImpact: Enables the development of rapid, inline bioprocess monitoring
    tools that can reduce waste, improve yield, and lower costs in biomanufacturing
    and biotechnology.
  rai:dataUseCases: Chemometric modelling, calibration transfer, multivariate regression,
    quantitative spectral analysis, process analytical technology (PAT).
  rai:personalSensitiveInformation: No personal or sensitive information is included.
