alzheimer:
  rai:dataAnnotationProtocol: Class labels assigned based on known sample identity
    or validated analytical reference methods.
  rai:dataBiases: Data were acquired under controlled laboratory conditions and may
    not generalise to field or clinical settings. Spectral profiles are influenced
    by instrument-specific factors (laser wavelength, detector type, optical path
    length, integration time). Class imbalances may be present in classification datasets.
  rai:dataCollection: Raman spectra were acquired experimentally using a laser spectrometer.
    Each spectrum represents the scattered light intensity as a function of Raman
    shift (cm⁻¹).
  rai:dataCollectionType: Laboratory measurements on human biological samples (blood
    serum, saliva, tissue biopsies) collected under clinical or research protocols.
  rai:dataLimitations: 'Models trained on this dataset may not transfer to different
    instruments, sample matrices, or patient populations without re-calibration. Note:
    No explicit license was stated by the original data providers; CC BY 4.0 has been
    assumed. Users should verify the applicable terms with the original authors.'
  rai:dataPreprocessingProtocol: Spectra are provided with class labels. Any preprocessing
    applied (baseline correction, smoothing, normalisation) is described in the source
    publication.
  rai:dataSocialImpact: Raman spectroscopy datasets for medical diagnostics have the
    potential to support the development of non-invasive, low-cost screening tools
    with particular relevance to resource-limited healthcare settings. Results must
    be validated by qualified healthcare professionals before any clinical application.
  rai:dataUseCases: Spectral library matching, material identification, disease screening,
    compound recognition, quality control.
  rai:personalSensitiveInformation: Spectra are derived from human biological samples
    (e.g., blood serum, saliva, or tissue). No direct patient identifiers are included,
    but biological measurements may constitute sensitive health-related data under
    applicable data-protection regulations.
amino_acids_glycine:
  rai:dataAnnotationProtocol: Time-resolved LC-Raman elution data for glycine (100 mM
    injection concentration). Labels are elution-time concentration profiles. Each
    amino acid eluted separately through an HPLC column (hydrophobic resin) using
    an H₂O-to-acetonitrile gradient mobile phase (7 mL/min, 50 µL injection). Data
    collected at NCTU, Taiwan (Lo, Hiramatsu lab). Purpose is benchmarking unsupervised
    label-free analyte detection algorithms; no per-spectrum expert labels required.
  rai:dataBiases: Single-laboratory, single-instrument benchmark dataset. Each amino
    acid measured in isolation — simultaneous multi-analyte elution not covered.
    Analyte concentrations are in the millimolar range (100 mM for glycine and leucine,
    55 mM for phenylalanine and tryptophan); performance of detection algorithms at
    lower physiological concentrations is unknown. arXiv preprint — findings not
    yet peer-reviewed at time of dataset release.
  rai:dataCollection: Liquid chromatography coupled Raman spectroscopy (LC-Raman)
    with vertical flow method. Mobile Raman probe attached to HPLC system (hydrophobic
    resin column, H₂O to acetonitrile gradient, 7 mL/min flow rate, 50 µL injection).
    Time-resolved acquisition at 0.2 s exposure per spectrum frame (~100 frames per
    20 s window per elution peak).
  rai:dataCollectionType: Time-resolved LC-Raman spectroscopy of amino acid solutions
    in a liquid chromatography flow cell.
  rai:dataLimitations: Small benchmark dataset covering only four amino acids in
    single-analyte conditions. The detection challenge arises from millimolar analyte
    concentrations against a strong H₂O/ACE solvent background. No explicit license
    stated; CC BY 4.0 assumed — verify with original authors.
  rai:dataPreprocessingProtocol: Fluorescence background removed by asymmetric polynomial
    fitting at each time step. Solvent spectrum (H₂O/ACE) removed by linear regression.
    Savitzky-Golay filter applied for smoothing. Resulting time-frequency matrix used
    directly for unsupervised algorithm benchmarking.
  rai:dataSocialImpact: LC-Raman with vertical flow enables real-time, label-free
    detection of analytes in chromatographic separations without destructive sampling.
    Applications include pharmaceutical process monitoring, metabolomics, and inline
    quality control in biomanufacturing.
  rai:dataUseCases: Benchmarking time-resolved analyte detection algorithms, unsupervised
    elution peak detection, PCA/NMF/MCR-ALS dimensionality reduction, LC-Raman method
    development.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from pure amino acid aqueous solutions without any human
    identifiers.
