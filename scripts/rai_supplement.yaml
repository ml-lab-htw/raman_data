  rai:dataAnnotationProtocol: Polymer-type labels assigned by combined Raman spectroscopy
    and ATR-FTIR identification against a Raman Database of Standard Microplastics
    (RDSP, 18 spectra of 8 polymer types). 155 microplastic debris samples hand-picked
    from sediments near waste plastics recycling industries in Laizhou City, Shandong
    Province, China (August 2018); 18 standard unweathered spectra from commercial
    plastic packaging. 124 spectra with distinct peaks selected for the final Raman
    Database of Weathered Plastics (RDWP). 20 debris samples remained unidentified.
    KnowItAll Informatics System 2018 (Bio-Rad) used for spectral matching.
  rai:dataBiases: Samples collected from a single geographic location (Laizhou City)
    dominated by PE and PP recycling waste; polymer distribution (PE 45%, PP 33%)
    reflects the local recycling industry and may not represent global environmental
    microplastic composition. Weathered spectra show high fluorescence background
    and weakened diagnostic peaks, increasing identification uncertainty. Class sizes
    are highly unequal (PE 62, PP 44, PET 10, PVC 4, PC 1, PA 2, ABS 1). All samples
    collected in a single season (August 2018); seasonal and geographic variability
    in weathering is not captured.
  rai:dataCollection: Confocal micro-Raman spectroscopy on selected microplastic
    debris targets. WITec alpha300-R confocal Raman imaging microscope, 532 nm excitation,
    2–10 mW (usually 5 mW), 10×–100× magnification (up to 360 nm spatial resolution),
    200–3500 cm-1, 600 lines/mm grating, 4 cm-1 spectral resolution, 1–10 s integration
    (usually 5 s), 1–10 accumulations (usually 4). Multiple spectra collected at
    different depths on the same sample using confocal function to minimise surface
    contamination artefacts. Complementary ATR-FTIR on Nicolet iS50 FT-IR (Thermo
    Scientific), 650–4000 cm-1, 0.482 cm-1 resolution, 20 accumulations.
  rai:dataCollectionType: Field-collected environmental samples (sediment microplastic
    debris) and commercial standard plastic materials analysed by laboratory micro-Raman
    spectroscopy and ATR-FTIR.
  rai:dataLimitations: 124-spectrum RDWP is a preliminary database; broader coverage
    of polymer types, geographic origins, and weathering durations is needed. Weathered
    spectra of PVC are particularly inconsistent with standard spectra due to dechlorination.
    Fluorescence from organic matter and surface oxidation products affects spectrum
    quality; 11 spectra were excluded from RDWP for this reason. RDWP effectiveness
    for identifying weathered microplastics requires validation by independent researchers.
    PS, PA, and ABS are represented by only 0–2 spectra; models cannot be trained
    for these classes.
  rai:dataPreprocessingProtocol: Raman spectra acquired without baseline subtraction
    (raw intensities). Spectra with large fluorescence background or inconsistent
    peaks were excluded from RDWP during curation. FTIR spectra collected with ATR
    accessory at 0.482 cm-1 resolution, 20 accumulations, 650–4000 cm-1. KnowItAll
    2018 used for spectral library search and polymer-type identification.
  rai:dataSocialImpact: Enables accurate identification of environmentally weathered
    microplastics, which standard reference libraries fail to match. Advances understanding
    of plastic degradation and persistence in natural environments. Supports environmental
    monitoring, policy compliance, and research into microplastic pollution pathways,
    toxicity, and remediation strategies.
  rai:dataUseCases: Weathered microplastic identification and classification, spectral
    database benchmarking, polymer degradation studies, environmental pollution monitoring,
    method development for field-applicable microplastic detection.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from environmental plastic debris and standard polymer materials
    without any human identifiers.
mlrod:
  rai:dataAnnotationProtocol: Mineralogical class labels assigned from known sample
    identity (gabbro from Madagascar, granite, Hawaiian basalt dust, 12 pure reference
    minerals, and 4 binary mineral mixtures) measured at 0%  and 50% basalt dust
    surface coverage. Over 500,000 spectra acquired by automated point-mapping
    at 0.1 µm XY step size.
  rai:dataBiases: All samples measured under controlled laboratory conditions (Horiba
    LabRAM HR Evolution, 532 nm, 100 mW, 1800 l/mm grating). Performance on natural
    outcrops, in-situ planetary surfaces, or mixed-lithology samples may differ.
    The dataset targets Mars analogue mineralogy (silicates, carbonates, sulfates)
    relevant to Perseverance/SuperCam; coverage of other planetary or terrestrial
    mineral assemblages is limited. No cosmic ray removal, baseline correction, or
    other preprocessing was applied — raw spectra include instrument artefacts.
  rai:dataCollection: Point-mapping Raman spectroscopy of geological samples. Horiba
    LabRAM HR Evolution, 532 nm excitation, 100 mW laser power, 1800 l/mm diffraction
    grating, approximately 1 cm-1 spectral resolution, open-electrode CCD cooled
    to -60 degrees C, 50x LWD objective (NA 0.5), 100-1800 cm-1 spectral window,
    0.1 µm XY step size.
  rai:dataCollectionType: Automated hyperspectral Raman mapping of solid geological
    samples in a laboratory setting.
  rai:dataLimitations: More than 500,000 spectra acquired from a limited set of rock
    types and pure mineral standards; rare or amorphous mineral phases are under-represented.
    No preprocessing was applied (no cosmic ray removal, no baseline subtraction),
    so raw spectra contain instrument artefacts. Models trained on these data are
    optimised for Mars analogue conditions (NASA Perseverance SuperCam context) and
    may require re-calibration for other instruments or geological settings. No explicit
    license was stated; CC BY 4.0 has been assumed.
  rai:dataPreprocessingProtocol: Spectra provided as raw Raman intensities without
    cosmic ray removal, baseline correction, smoothing, or normalisation. Labels
    encode mineral class and basalt dust coverage fraction.
  rai:dataSocialImpact: Supports development of automated mineralogical analysis
    algorithms for planetary exploration (Mars, Moon) and terrestrial geoscience.
    Enables benchmarking of machine learning methods for spectral classification
    under realistic signal-to-noise and mixing conditions.
  rai:dataUseCases: Mineral identification and classification, spectral unmixing,
    Mars analogue mineralogy, deep learning benchmarks for geological spectroscopy,
    robotic planetary exploration support.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from geological samples (rocks, minerals, and dust) without
    any human identifiers.
