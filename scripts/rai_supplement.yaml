# Editable RAI supplement for raman_data Croissant files.
# Each top-level key is a dataset_key (as used in raman_data()).
# Values here override the auto-generated RAI defaults on the next run.
# Run generate_croissant.py after editing to regenerate the JSON-LD files.
#
# Available RAI fields per dataset:
#   rai:dataCollection          — how the spectra were physically acquired
#   rai:dataCollectionType      — type of measurement (e.g. patient samples)
#   rai:dataPreprocessingProtocol — preprocessing applied before release
#   rai:dataAnnotationProtocol  — how labels / targets were determined
#   rai:personalSensitiveInformation — note if human data is present
#   rai:dataBiases              — known biases and their sources
#   rai:dataLimitations         — conditions where dataset may not apply
#   rai:dataSocialImpact        — potential societal benefits or risks
#   rai:dataUseCases            — recommended ML use cases

acetic_acid_species:
  rai:dataAnnotationProtocol: Mole fraction targets for two acid species (AA, AA⁻)
    derived from pH-based acid dissociation equilibria combined with Indirect Hard
    Modeling (IHM). Method A uses literature pKa values; method B estimates pKa =
    4.70 via MCR-ALS and IHM fitting (close to literature). Calibration validated
    with leave-10%-out cross-validation; RMSECV ≤ 2.43 × 10⁻⁴ mol mol⁻¹.
  rai:dataBiases: Spectra collected under ideal dilute mixture assumption (activity
    coefficients = 1), which introduces systematic error at ionic strengths above
    0.01 mol L⁻¹. Data acquired at a single instrument (Kaiser RXN2, 785 nm) and
    temperature (25 °C); models may not transfer without recalibration. Monoprotic
    system covers only two species (AA, AA⁻).
  rai:dataCollection: Inline Raman spectra acquired during NaOH (1 mol L⁻¹) titration
    of acetic acid (Merck, 99–100%) in deionized water (0.8 μS cm⁻¹) at 25 °C using
    a Kaiser RXN2 Raman analyzer (400 mW, 785 nm) with NIR fiber-optic immersion probe,
    spectral range 160–3285 cm⁻¹, 4 cm⁻¹ resolution, 60 s acquisition time. Ambient
    light excluded by non-transparent black PVC liner. pH monitored continuously with
    SenTix 940 electrode and Multil 3420 pH meter (WTW).
  rai:dataCollectionType: Titration Raman spectroscopy of monoprotic acetic acid (CH₃COOH)
    in aqueous solution. Spectra recorded at pH equilibrium across the full titration
    range for two dissociation species (AA, AA⁻).
  rai:dataLimitations: Models calibrated on NaOH titration in deionized water at 25 °C;
    not directly applicable to complex matrices, elevated temperatures, or concentrations
    outside the calibration range. Ideal mixture assumption not strictly valid at concentrations
    above 0.1 mol L⁻¹. Extrapolation to other instruments requires recalibration.
  rai:dataPreprocessingProtocol: Standard Normal Variate (SNV) normalisation, linear
    baseline correction, and offset subtraction applied. Evaluation range 1025–1850
    cm⁻¹ selected, excluding atmospheric O₂ signal (1545–1565 cm⁻¹). Preprocessing
    performed in MATLAB R2017a (spectral subtraction) and PEAXACT ver. 4.5 (S-PACT).
  rai:dataSocialImpact: Acetic acid is a key platform chemical in biorefinery, fermentation,
    and chemical manufacturing. Inline quantification of its dissociation species supports
    real-time monitoring and control of biotransformation and acid purification processes,
    contributing to more efficient biobased production.
  rai:dataUseCases: Inline concentration monitoring of monoprotic acid dissociation
    in aqueous solution; IHM vs. PLS benchmarking; pKa estimation for systems with
    unknown dissociation constants; process analytical technology (PAT) in biobased
    acid production and purification.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from chemical samples without individual human identifiers.
adenine_colloidal_gold:
  rai:dataAnnotationProtocol: Ground-truth adenine concentrations were gravimetrically
    prepared by the organizing laboratory (University of Trieste) as standard solutions
    in 0.01 M pH 7.4 phosphate buffer, then aliquoted and shipped to all participants.
    A blind design was applied - only the organizing laboratory knew the test set concentrations.
    Calibration models were built by inverse least-squares regression on integrated
    SERS band areas of the adenine ring-breathing mode (715-750 cm⁻¹).
  rai:dataBiases: Data collected with a single colloidal substrate type (naked Au
    nanoparticles from laser ablation synthesis, University of Padova) and a single
    analyte (adenine); results are specific to this substrate-analyte combination and
    should not be extrapolated to other SERS substrates or analytes. Only 785 nm
    excitation was used for the gold colloidal method (cAu@785); no green-laser
    coverage is included. Signal variability arises from differences in laser power,
    optics, and detector responsivities across participating instruments (six models
    from three manufacturers). Only five of eight expected laboratory datasets reached
    the final analysis, limiting statistical power.
  rai:dataCollection: SERS spectra of adenine in 0.01 M pH 7.4 phosphate buffer
    acquired on colloidal gold nanoparticle substrates (naked Au nanoparticles
    produced by laser ablation synthesis, University of Padova) at 785 nm excitation.
    Collected as part of the first European multi-instrument SERS interlaboratory
    study (ILS) within EU COST Action BM1401 Raman4Clinics, involving 15 laboratories
    from 11 European countries and 44 researchers (July-October 2018). Six instrument
    models from three manufacturers were used across labs (WiTec Alpha 300R, Horiba
    LabRAM 300, Horiba LabRAM ARAMIS, Horiba LabRAM HR 800, Horiba T64000, Renishaw
    InVia); laser power and acquisition time were set by each lab within prescribed
    limits. Three batches of colloidal substrate and three replicates per sample
    were used, yielding nine spectra per concentration level per method per laboratory.
    The analyte concentration range spans 0 to approximately 0.8 µM at five levels.
  rai:dataCollectionType: Quantitative SERS measurements of adenine on colloidal gold
    nanoparticle substrates, collected in a multi-laboratory interlaboratory study to
    assess the inter-instrument reproducibility and trueness of quantitative SERS
    across European research facilities.
  rai:dataLimitations: Results valid only within the studied concentration range
    (0-0.8 µM) and for the specific colloidal gold substrate; extrapolation to other
    concentrations or substrates is not validated. RMSEP 13%, SEP 13%, BIAS 3%
    (normalized) characterise the average accuracy across all participating laboratories
    and do not represent the uncertainty achievable by a single optimised setup.
    Only five of eight expected laboratory datasets are included in the final analysis.
    Intrinsic SERS signal variability (hot spots, colloidal batch-to-batch differences)
    limits the reproducibility of quantitative models. The interlaboratory RMSEP
    cannot be used directly as a single-lab prediction uncertainty.
  rai:dataPreprocessingProtocol: Raw spectra preprocessed following a centrally
    defined Data Analysis Protocol (DAP) implemented in R (version 3.4.3, packages
    hyperSpec and dplyr). Steps include extended multiplicative scatter correction
    (EMSC), smoothing, spectral range selection, baseline correction, and
    normalization. Quantification performed by integrating the SERS ring-breathing
    band area between 715 and 750 cm⁻¹ and fitting a linear inverse least-squares
    calibration model. Calibration curves with poor linear fit (r² < 0.6 or
    F-test p > 0.01) were excluded from the final analysis.
  rai:dataSocialImpact: Represents the first large-scale European collaborative
    benchmark for quantitative SERS, contributing to the standardisation of SERS
    measurement protocols across laboratories. Supports the development of reproducible,
    validated SERS methods for clinical diagnostics, food safety, and environmental
    monitoring within the Raman4Clinics initiative (EU COST Action BM1401).
  rai:dataUseCases: Benchmarking quantitative SERS calibration methods across
    instruments and laboratories; evaluating inter-laboratory reproducibility and
    trueness of SERS quantification; development and testing of SERS spectral
    preprocessing and regression algorithms; comparing colloidal gold versus other
    SERS substrate types for quantitative analytical applications.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from adenine reference solutions without individual human
    identifiers.
adenine_colloidal_silver:
  rai:dataAnnotationProtocol: Ground-truth adenine concentrations were gravimetrically
    prepared by the organizing laboratory (University of Trieste) as standard solutions
    in 0.01 M pH 7.4 phosphate buffer, then aliquoted and shipped to all participants.
    A blind design was applied - only the organizing laboratory knew the test set concentrations.
    Calibration models were built by inverse least-squares regression on integrated
    SERS band areas of the adenine ring-breathing mode (715-750 cm⁻¹). This dataset
    combines two excitation methods - cAg@532 (532 nm) and cAg@785 (785 nm).
  rai:dataBiases: Data collected with a single colloidal substrate type (naked Ag
    nanoparticles from laser ablation synthesis, University of Padova) and a single
    analyte (adenine); results are specific to this substrate-analyte combination and
    should not be extrapolated to other SERS substrates or analytes. Signal variability
    arises from differences in laser power, optics, and detector responsivities across
    participating instruments (six models from three manufacturers). The 532 nm method
    (cAg@532) data from one laboratory (P10) was rejected due to parafilm contamination
    of the hydrophobic colloidal substrate, which interfered with adenine bands; this
    risk is absent for the 785 nm method but illustrates substrate preparation
    sensitivity. The cAg@532 method showed significant systematic BIAS (11%),
    whereas cAg@785 showed negligible BIAS (-4%). The cAg@785 calibration curves
    from some labs exhibited slight nonlinearity symptoms at higher concentrations.
  rai:dataCollection: SERS spectra of adenine in 0.01 M pH 7.4 phosphate buffer
    acquired on colloidal silver nanoparticle substrates (naked Ag nanoparticles
    produced by laser ablation synthesis, University of Padova) at both 532 nm and
    785 nm excitation. Collected as part of the first European multi-instrument SERS
    interlaboratory study (ILS) within EU COST Action BM1401 Raman4Clinics, involving
    15 laboratories from 11 European countries and 44 researchers (July-October 2018).
    Six instrument models from three manufacturers were used across labs (WiTec Alpha
    300R, Horiba LabRAM 300, Horiba LabRAM ARAMIS, Horiba LabRAM HR 800, Horiba
    T64000, Renishaw InVia); laser power and acquisition time were set by each lab
    within prescribed limits. Three batches of colloidal substrate and three replicates
    per sample were used, yielding nine spectra per concentration level per method per
    laboratory. The analyte concentration range spans 0 to approximately 2 µM at
    five levels. Final analysis included five labs for cAg@532 and seven labs for
    cAg@785.
  rai:dataCollectionType: Quantitative SERS measurements of adenine on colloidal
    silver nanoparticle substrates using two excitation wavelengths (532 nm and 785 nm),
    collected in a multi-laboratory interlaboratory study to assess the inter-instrument
    reproducibility and trueness of quantitative SERS across European research facilities.
  rai:dataLimitations: Results valid only within the studied concentration range
    (0-2 µM) and for the specific colloidal silver substrate; extrapolation to other
    concentrations or substrates is not validated. Performance differs significantly
    between excitation wavelengths - cAg@532 achieves RMSEP 24% (SEP 21%, BIAS 11%)
    while cAg@785 achieves RMSEP 19% (SEP 19%, BIAS -4%). The large BIAS at 532 nm
    may indicate systematic differences between laboratories using different 532 nm
    instruments. Intrinsic SERS signal variability (hot spots, colloidal batch-to-batch
    differences) limits quantitative reproducibility. The interlaboratory RMSEP cannot
    be used directly as a single-lab prediction uncertainty.
  rai:dataPreprocessingProtocol: Raw spectra preprocessed following a centrally
    defined Data Analysis Protocol (DAP) implemented in R (version 3.4.3, packages
    hyperSpec and dplyr). Steps include extended multiplicative scatter correction
    (EMSC), smoothing, spectral range selection, baseline correction, and
    normalization. Quantification performed by integrating the SERS ring-breathing
    band area between 715 and 750 cm⁻¹ and fitting a linear inverse least-squares
    calibration model. Calibration curves with poor linear fit (r² < 0.6 or
    F-test p > 0.01) were excluded. Additionally, cAg@532 and cAu@785 data from
    laboratory P10 were excluded at the data inspection stage due to parafilm
    interference with adenine bands.
  rai:dataSocialImpact: Represents the first large-scale European collaborative
    benchmark for quantitative SERS, contributing to the standardisation of SERS
    measurement protocols across laboratories. Supports the development of reproducible,
    validated SERS methods for clinical diagnostics, food safety, and environmental
    monitoring within the Raman4Clinics initiative (EU COST Action BM1401).
  rai:dataUseCases: Benchmarking quantitative SERS calibration methods across
    instruments and laboratories; evaluating the effect of excitation wavelength
    (532 nm vs. 785 nm) on inter-laboratory reproducibility; development and testing
    of SERS spectral preprocessing and regression algorithms; comparing colloidal
    silver versus other SERS substrate types for quantitative analytical applications.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from adenine reference solutions without individual human
    identifiers.
adenine_solid_gold:
  rai:dataAnnotationProtocol: Ground-truth adenine concentrations were gravimetrically
    prepared by the organizing laboratory (University of Trieste) as standard solutions
    in 0.01 M pH 7.4 phosphate buffer, then aliquoted and shipped to all participants.
    A blind design was applied - only the organizing laboratory knew the test set concentrations.
    Calibration models were built by inverse least-squares regression on integrated
    SERS band areas of the adenine ring-breathing mode (715-750 cm⁻¹).
  rai:dataBiases: Data collected with a single solid substrate type (commercially
    available gold-coated silicon nanopillars, Silmeco ApS, Denmark) and a single
    analyte (adenine); results are specific to this substrate-analyte combination
    and should not be extrapolated to other SERS substrates or analytes. Only 785 nm
    excitation was used for the solid gold method (sAu@785); no green-laser coverage
    is included. Signal variability arises from differences in laser power, optics,
    and detector responsivities across participating instruments (six models from
    three manufacturers). The producer's recommended measurement (full substrate map)
    was replaced by three spectra from random locations per substrate due to practical
    constraints, which may reduce spatial averaging of signal heterogeneity. Only
    five of eight expected laboratory datasets reached the final analysis.
  rai:dataCollection: SERS spectra of adenine in 0.01 M pH 7.4 phosphate buffer
    acquired on solid gold substrate (gold-coated silicon nanopillar arrays, Silmeco
    ApS, Denmark) at 785 nm excitation. Collected as part of the first European
    multi-instrument SERS interlaboratory study (ILS) within EU COST Action BM1401
    Raman4Clinics, involving 15 laboratories from 11 European countries and 44
    researchers (July-October 2018). Six instrument models from three manufacturers
    were used across labs (WiTec Alpha 300R, Horiba LabRAM 300, Horiba LabRAM
    ARAMIS, Horiba LabRAM HR 800, Horiba T64000, Renishaw InVia); laser power
    and acquisition time were set by each lab within prescribed limits (10x or 20x
    magnification). Three different substrates and three spectra per substrate
    were collected per sample, yielding nine spectra per concentration level per
    method per laboratory. The analyte concentration range spans 0 to approximately
    4 µM at five levels.
  rai:dataCollectionType: Quantitative SERS measurements of adenine on solid gold
    nanostructured substrate (metal-coated silicon nanopillars), collected in a
    multi-laboratory interlaboratory study to assess the inter-instrument reproducibility
    and trueness of quantitative SERS across European research facilities.
  rai:dataLimitations: Results valid only within the studied concentration range
    (0-4 µM) and for the specific solid gold substrate; extrapolation to other
    concentrations or substrates is not validated. RMSEP 28% (SEP 29%, BIAS -2%)
    represents the highest variability among the four substrate methods in this
    study, indicating lower inter-laboratory reproducibility for this substrate.
    The three-spectra-per-substrate sampling replaces the producer-recommended
    full map and may under-represent spatial heterogeneity of the substrate. Only
    five of eight expected laboratory datasets are included in the final analysis.
    Intrinsic SERS signal variability (substrate-to-substrate fabrication differences,
    hot spot distribution) limits quantitative reproducibility.
  rai:dataPreprocessingProtocol: Raw spectra preprocessed following a centrally
    defined Data Analysis Protocol (DAP) implemented in R (version 3.4.3, packages
    hyperSpec and dplyr). Steps include extended multiplicative scatter correction
    (EMSC), smoothing, spectral range selection, baseline correction, and
    normalization. Quantification performed by integrating the SERS ring-breathing
    band area between 715 and 750 cm⁻¹ and fitting a linear inverse least-squares
    calibration model. Calibration curves with poor linear fit (r² < 0.6 or
    F-test p > 0.01) were excluded from the final analysis.
  rai:dataSocialImpact: Represents the first large-scale European collaborative
    benchmark for quantitative SERS, contributing to the standardisation of SERS
    measurement protocols across laboratories. Supports the development of reproducible,
    validated SERS methods for clinical diagnostics, food safety, and environmental
    monitoring within the Raman4Clinics initiative (EU COST Action BM1401).
  rai:dataUseCases: Benchmarking quantitative SERS calibration methods on solid
    gold substrates across instruments and laboratories; evaluating inter-laboratory
    reproducibility and trueness; development and testing of SERS spectral preprocessing
    and regression algorithms; comparing solid gold versus colloidal and solid silver
    SERS substrates for quantitative analytical applications.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from adenine reference solutions without individual human
    identifiers.
adenine_solid_silver:
