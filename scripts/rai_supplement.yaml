wheat_lines:
  rai:dataAnnotationProtocol: Class labels assigned based on known genotype and
    treatment condition. Four classes are present in the dataset - commercial
    cultivar without salt stress (COM), commercial cultivar under 125 mM NaCl
    (COM_125mM), Mutant Line 1 under 125 mM NaCl (ML1_125mM), and Mutant Line
    2 under 125 mM NaCl (ML2_125mM). Mutant lines were advanced to the seventh
    generation under alternating in vitro and in vivo salt-stress selection before
    spectral acquisition; genotype identity is therefore known a priori.
  rai:dataBiases: Dataset derived from a single wheat cultivar (Triticum aestivum
    L. Adana-99) and only two derived mutant lines; results may not generalise to
    other wheat varieties or mutagenesis strategies. Salt stress applied at only
    one concentration (125 mM NaCl); other salinities are not represented. Only
    leaf tissue was studied; root or shoot tissue responses are not captured.
    Spectra acquired on a custom single-site instrument at Bogazici University;
    instrument-specific optical characteristics (bandpass filter, fiber coupling,
    objective) may affect transferability to other Raman setups. Quantile
    elimination (0.005-0.995) and random downsampling to 6,836 spectra per class
    may discard informative measurements and introduce sampling bias.
  rai:dataCollection: Raman spectra acquired using a custom confocal Raman
    microspectroscopy system at Bogazici University Department of Physics,
    consisting of a diode laser (785 nm, 100 mW, LaserGlow), an Ocean QE-Pro
    spectrometer, and a Nikon Ti rigid-body microscope with a 10x/0.25 NA Olympus
    objective. Backscattered Raman signal collected at 180-degree geometry with
    Rayleigh rejection via Semrock bandpass and edge filters; spectra visualized
    using Oceanview software. Leaf tissue collected from three leaves per group
    (commercial cultivar with and without salt stress, two advanced mutant lines
    under 125 mM NaCl); 4,221 spectra measured per leaf scan, giving 12,663 raw
    spectra per class before outlier removal. Plants grown in peat moss/perlite
    (1:2 v/v) under 16 h/8 h photoperiod at 500 µmol/m2/s and 26 degrees C;
    salt treatment applied as 1/10 Hoagland solution with 125 mM NaCl for 2 weeks
    starting 14 days after germination.
  rai:dataCollectionType: Confocal Raman microspectroscopy of leaf tissue from
    Triticum aestivum L. Adana-99 commercial cultivar and two sodium-azide-derived
    advanced mutant lines, collected to benchmark Raman spectroscopy as a rapid
    phenotyping alternative to conventional biochemical techniques in plant breeding.
  rai:dataLimitations: Only one commercial cultivar and two mutant lines are
    represented; the classifier may not generalise to other wheat varieties,
    mutagen types, or stress conditions. Salt treatment studied at a single
    concentration (125 mM NaCl) only; intermediate or higher salinities are not
    covered. No integration time is reported in the source publication, which
    limits exact reproducibility. The balanced dataset was produced by random
    downsampling to 6,836 spectra per class, discarding a portion of the acquired
    spectra. The trained decision tree is specific to MATLAB R2021b and may
    require retraining for other analysis environments.
  rai:dataPreprocessingProtocol: Preprocessing performed in MATLAB using published
    analysis codes (github.com/ikecoglu/PhotonicsLab) in three steps - Raman
    shift calibration, baseline correction via polynomial curve fitting, and vector
    normalization (Heraud et al., 2006). Outliers removed by quantile elimination
    retaining the 0.005-0.995 interval. To balance class sizes, random sampling
    reduced each class to 6,836 spectra (the size of the smallest group after
    elimination), yielding 13,672 spectra from the commercial cultivar and 13,672
    from the mutant lines. A decision tree classifier (Gini index, max 100 splits)
    trained on 80% of the data and tested on 20%, achieving 94.62% accuracy with
    95.06% sensitivity and 94.18% specificity in the source publication.
  rai:dataSocialImpact: Demonstrates that Raman spectroscopy can replace
    time-consuming biochemical assays (antioxidant enzyme activity, chlorophyll
    quantification, ion analysis, qPCR gene expression) for differentiating
    salt-tolerant wheat mutant lines from commercial cultivars. Supports faster
    and lower-cost phenotyping pipelines in plant breeding programs, contributing
    to the development of salt-tolerant wheat varieties for food security in
    saline-affected agricultural regions.
  rai:dataUseCases: Classification of wheat genotypes and stress-treatment groups
    from leaf Raman spectra; benchmarking machine learning classifiers for
    agricultural plant phenotyping; development of rapid Raman-based screening
    tools for salt-tolerance breeding programs; spectral band assignment for
    protein, carotenoid, and amino-acid markers in plant tissue Raman analysis.
  rai:personalSensitiveInformation: No personal or sensitive information is included.
    All spectra originate from wheat plant leaf tissue without individual human
    identifiers.
